<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Sueño</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f5f5f5;
            --text-primary: #2c2c2c; --text-secondary: #6b6b6b;
            --accent: #8b5cf6; --accent-light: #a78bfa;
            --border: #e0e0e0; --success: #10b981; --warning: #f59e0b;
            --card-bg: #ffffff;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #191919; --bg-secondary: #252525;
                --text-primary: #ffffff; --text-secondary: #a0a0a0;
                --accent: #a78bfa; --accent-light: #c4b5fd;
                --border: #2f2f2f; --success: #34d399; --warning: #fbbf24;
                --card-bg: #202020;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
        .sleep-score { background: linear-gradient(135deg, var(--accent), var(--accent-light)); border-radius: 16px; padding: 2rem; color: white; text-align: center; margin-bottom: 2rem; }
        .score-value { font-size: 4rem; font-weight: 700; }
        .score-label { font-size: 1rem; opacity: 0.9; margin-top: 0.5rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.85rem; color: var(--text-secondary); }
        .chart-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
        .chart-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
        .chart-wrapper { position: relative; height: 300px; }
        .loading { text-align: center; padding: 3rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌙 Análisis de Sueño</h1>
        <p class="subtitle">Última actualización: <span id="lastUpdate">Cargando...</span></p>
        
        <div class="sleep-score">
            <div class="score-value" id="avgSleep">0h</div>
            <div class="score-label">Promedio de Sueño (Últimos 7 días)</div>
        </div>
        
        <div class="stats-grid" id="statsGrid"><div class="loading">Cargando...</div></div>
        
        <div class="chart-container">
            <div class="chart-title">Tendencia de Sueño (Minutos)</div>
            <div class="chart-wrapper"><canvas id="sleepChart"></canvas></div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('datos.json');
                const data = await response.json();
                document.getElementById('lastUpdate').textContent = data.metadata?.ultima_actualizacion || 'Desconocida';
                
                // NOMBRES EXACTOS: Minutos totales (formula/number), Hora de despertar (date)
                const suenos = data.datos?.sueno || data.sueno || [];
                processSleep(suenos);
            } catch (error) {
                document.getElementById('statsGrid').innerHTML = `<div style="color: var(--accent);">Error: ${error.message}</div>`;
            }
        }

        function processSleep(suenos) {
            const processed = suenos.map(s => {
                const props = s.properties || {};
                
                // Buscar columna de minutos (puede ser formula o number)
                const minutos = props.Minutos_totales?.formula?.number || 
                               props.Minutos_totales?.number || 
                               props.Minutos?.number || 0;
                
                // Hora de despertar
                const horaDespertar = props.Hora_de_despertar?.date?.start || 
                                     props.Hora_despertar?.date?.start;
                
                return {
                    minutos: minutos,
                    horas: minutos / 60,
                    horaDespertar: horaDespertar ? new Date(horaDespertar) : null,
                    fecha: new Date(s.created_time)
                };
            }).slice(-7); // Últimos 7 días

            const promedioHoras = processed.reduce((s, r) => s + r.horas, 0) / processed.length || 0;
            const totalMinutos = processed.reduce((s, r) => s + r.minutos, 0);
            
            // Calcular calidad (8h = 100%)
            const calidad = Math.min((promedioHoras / 8) * 100, 100);

            document.getElementById('avgSleep').textContent = promedioHoras.toFixed(1) + 'h';
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${calidad.toFixed(0)}%</div>
                    <div class="stat-label">Calidad de Sueño</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${processed.length}</div>
                    <div class="stat-label">Noches Registradas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${(totalMinutos / 60).toFixed(1)}h</div>
                    <div class="stat-label">Total Semanal</div>
                </div>
            `;

            renderChart(processed);
        }

        function renderChart(suenos) {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const textColor = isDark ? '#ffffff' : '#2c2c2c';
            const gridColor = isDark ? '#2f2f2f' : '#e0e0e0';

            new Chart(document.getElementById('sleepChart'), {
                type: 'line',
                data: {
                    labels: suenos.map(s => s.fecha.toLocaleDateString('es', { weekday: 'short' })),
                    datasets: [{
                        label: 'Minutos de sueño',
                        data: suenos.map(s => s.minutos),
                        borderColor: '#8b5cf6',
                        backgroundColor: 'rgba(139, 92, 246, 0.1)',
                        fill: true,
                        tension: 0.4
                    }, {
                        label: 'Meta (480min = 8h)',
                        data: suenos.map(() => 480),
                        borderColor: '#10b981',
                        borderDash: [5, 5],
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: textColor } } },
                    scales: {
                        y: { grid: { color: gridColor }, ticks: { color: textColor } },
                        x: { grid: { color: gridColor }, ticks: { color: textColor } }
                    }
                }
            });
        }

        loadData();
    </script>
</body>
</html>
