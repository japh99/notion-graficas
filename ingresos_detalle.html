<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --text: #37352f; }
        @media (prefers-color-scheme: dark) { :root { --text: #EBEBEB; } }
        body { font-family: sans-serif; background: transparent; color: var(--text); display: flex; flex-direction: column; align-items: center; }
        .chart-box { width: 100%; max-width: 400px; height: 250px; }
        .insight { background: rgba(46, 160, 67, 0.1); padding: 10px; border-radius: 8px; width: 90%; font-size: 12px; border-left: 4px solid #2ea043; }
    </script>
</head>
<body>
    <h3>Historial de Ingresos</h3>
    <div class="chart-box"><canvas id="canvas"></canvas></div>
    <div id="insight" class="insight"></div>

    <script>
        const MESES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        fetch('datos.json').then(r => r.json()).then(data => {
            let mesesData = {};
            let maxMonto = 0; let topItem = ""; let topMes = "";

            data.ingresos.forEach(r => {
                const m = r.properties.Monto.number || 0;
                const mes = r.properties.Mes.select?.name;
                const item = r.properties["Items "].title[0]?.plain_text;
                
                if(mes) {
                    mesesData[mes] = (mesesData[mes] || 0) + m;
                    if(m > maxMonto) { maxMonto = m; topItem = item; topMes = mes; }
                }
            });

            const labels = MESES.filter(m => mesesData[m]);
            const values = labels.map(m => mesesData[m]);

            document.getElementById('insight').innerHTML = `🚀 <b>Mes Récord:</b> ${topMes}<br>💎 <b>Mejor Ingreso:</b> ${topItem} ($${maxMonto.toLocaleString()})`;

            new Chart(document.getElementById('canvas'), {
                type: 'line',
                data: { labels, datasets: [{ label: 'Ingresos', data: values, borderColor: '#2ea043', fill: true, backgroundColor: 'rgba(46,160,67,0.1)' }] },
                options: { scales: { y: { ticks: { color: '#888' } }, x: { ticks: { color: '#888' } } } }
            });
        });
    </script>
</body>
</html>
