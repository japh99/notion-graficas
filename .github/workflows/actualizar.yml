name: 🚀 Actualizar Datos Notion - JAPH 2026

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    name: 📊 Sincronización
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Descargar código fuente
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz

      - name: 🚜 Ejecutar Script de Extracción
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DB_INGRESOS: ${{ secrets.DB_INGRESOS }}
          DB_EGRESOS: ${{ secrets.DB_EGRESOS }}
          DB_TAREAS: ${{ secrets.DB_TAREAS }}
          DB_HABITOS: ${{ secrets.DB_HABITOS }}
          DB_POMODORO: ${{ secrets.DB_POMODORO }}
          DB_MEMENTO: ${{ secrets.DB_MEMENTO }}
          DB_SUBS: ${{ secrets.DB_SUBS }}
          DB_SUENO: ${{ secrets.DB_SUENO }}
          DB_COMPRAS: ${{ secrets.DB_COMPRAS }}
        run: python main.py

      - name: 🔍 Verificar datos.json
        run: |
          if [ ! -f datos.json ]; then
            echo "❌ Error: datos.json no fue generado"
            exit 1
          fi
          ls -lh datos.json
          echo "✅ datos.json generado correctamente"

      - name: 💾 Guardar cambios en repositorio
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add datos.json
          
          if git diff --cached --quiet; then
            echo "ℹ️ Sin cambios significativos"
            exit 0
          fi
          
          git commit -m "🔄 Sincronización automática - $(date '+%Y-%m-%d %H:%M')"
          git push
