name: Actualizar Dashboard

on:
  schedule:
    - cron: '0 * * * *'  # Ejecutar cada hora
  workflow_dispatch:      # Botón manual

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Permiso para guardar datos.json

    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: pip install requests pytz

      - name: Ejecutar Extractor Maestro
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          # Finanzas
          DB_INGRESOS: ${{ secrets.DB_INGRESOS }}
          DB_EGRESOS: ${{ secrets.DB_EGRESOS }}
          DB_SUBS: ${{ secrets.DB_SUBS }}
          DB_COMPRAS: ${{ secrets.DB_COMPRAS }}
          # Productividad
          DB_TAREAS: ${{ secrets.DB_TAREAS }}
          DB_POMODORO: ${{ secrets.DB_POMODORO }}
          DB_PROYECTOS: ${{ secrets.DB_PROYECTOS }}
          # Salud y Vida
          DB_HABITOS: ${{ secrets.DB_HABITOS }}
          DB_SUENO: ${{ secrets.DB_SUENO }}
          DB_SUENO_DETALLES: ${{ secrets.DB_SUENO_DETALLES }}
          DB_SUENO_RESUMEN: ${{ secrets.DB_SUENO_RESUMEN }}
          DB_MEMENTO: ${{ secrets.DB_MEMENTO }}
        run: python main.py

      - name: Guardar cambios
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add datos.json
          git commit -m "Sincronización de datos Notion" || exit 0
          git push
