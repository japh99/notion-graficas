name: Actualizar Dashboard

on:
  schedule:
    - cron: '0 * * * *'  # Se ejecuta automáticamente cada hora
  workflow_dispatch:      # Permite ejecutarlo manualmente con un botón

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Permiso obligatorio para guardar el archivo datos.json

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar librerías necesarias
        run: pip install requests pytz

      - name: Ejecutar Robot Extractor (Python)
        env:
          # Aquí conectamos tus Secrets de GitHub con el código
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DB_INGRESOS: ${{ secrets.DB_INGRESOS }}
          DB_EGRESOS: ${{ secrets.DB_EGRESOS }}
          DB_TAREAS: ${{ secrets.DB_TAREAS }}
          DB_HABITOS: ${{ secrets.DB_HABITOS }}
          DB_POMODORO: ${{ secrets.DB_POMODORO }}
          DB_MEMENTO: ${{ secrets.DB_MEMENTO }}
          DB_SUBS: ${{ secrets.DB_SUBS }}
          DB_SUENO: ${{ secrets.DB_SUENO }}
          DB_SUENO_DETALLES: ${{ secrets.DB_SUENO_DETALLES }}
          DB_SUENO_RESUMEN: ${{ secrets.DB_SUENO_RESUMEN }}
          DB_COMPRAS: ${{ secrets.DB_COMPRAS }}
        run: python main.py

      - name: Guardar datos.json en el repositorio
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add datos.json
          git commit -m "Sincronización automática de datos desde Notion" || exit 0
          git push
