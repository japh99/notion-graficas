name: 🚀 Actualizar Datos Notion - JAPH 2026

# ==========================================
# ⏰ DISPARADORES (TRIGGERS)
# ==========================================
on:
  # Ejecución automática cada hora
  schedule:
    - cron: '0 * * * *'
  
  # Ejecución manual desde GitHub UI
  workflow_dispatch:
    inputs:
      log_level:
        description: 'Nivel de logging'
        required: false
        default: 'INFO'
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING

  # Ejecución al hacer push en main (solo si cambian archivos relevantes)
  push:
    branches: [main]
    paths:
      - 'main.py'
      - 'requirements.txt'
      - '.github/workflows/actualizar.yml'

# ==========================================
# 🔒 PERMISOS Y CONFIGURACIÓN GLOBAL
# ==========================================
permissions:
  contents: write
  actions: read
  checks: write  # Para reportar estado

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

# ==========================================
# 🎯 TRABAJO PRINCIPAL
# ==========================================
jobs:
  actualizar:
    name: 📊 Sincronización Notion → GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Prevenir jobs colgados
    
    outputs:
      registros_total: ${{ steps.ejecucion.outputs.registros_total }}
      estado: ${{ steps.ejecucion.outputs.estado }}
    
    steps:
      # --------------------------------------
      # 1. CHECKOUT DEL CÓDIGO
      # --------------------------------------
      - name: 📥 Descargar código fuente
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # Shallow clone para velocidad
          persist-credentials: true

      # --------------------------------------
      # 2. CONFIGURAR PYTHON
      # --------------------------------------
      - name: 🐍 Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      # --------------------------------------
      # 3. INSTALAR DEPENDENCIAS
      # --------------------------------------
      - name: 📦 Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz
          
          # Verificar instalación
          python -c "import requests, pytz; print('✅ Dependencias OK')"

      # --------------------------------------
      # 4. EJECUTAR EXTRACTOR
      # --------------------------------------
      - name: 🚜 Ejecutar Script de Extracción
        id: ejecucion
        env:
          # Tokens y configuración sensible
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          
          # IDs de bases de datos (todos opcionales, el script maneja ausencias)
          DB_INGRESOS: ${{ secrets.DB_INGRESOS }}
          DB_EGRESOS: ${{ secrets.DB_EGRESOS }}
          DB_TAREAS: ${{ secrets.DB_TAREAS }}
          DB_HABITOS: ${{ secrets.DB_HABITOS }}
          DB_POMODORO: ${{ secrets.DB_POMODORO }}
          DB_MEMENTO: ${{ secrets.DB_MEMENTO }}
          DB_SUBS: ${{ secrets.DB_SUBS }}
          DB_SUENO: ${{ secrets.DB_SUENO }}
          DB_COMPRAS: ${{ secrets.DB_COMPRAS }}
          
          # Configuración adicional
          LOG_LEVEL: ${{ github.event.inputs.log_level || 'INFO' }}
          TZ: America/Bogota
          
        run: |
          echo "🚀 Iniciando extracción de datos..."
          python main.py
          
          # Extraer métricas para outputs
          if [ -f datos.json ]; then
            REGISTROS=$(python -c "import json; d=json.load(open('datos.json')); print(d['metadata']['total_registros'])")
            echo "registros_total=$REGISTROS" >> $GITHUB_OUTPUT
            echo "estado=success" >> $GITHUB_OUTPUT
            echo "✅ Extracción completada: $REGISTROS registros"
          else
            echo "estado=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

      # --------------------------------------
      # 5. VERIFICAR INTEGRIDAD DEL JSON
      # --------------------------------------
      - name: 🔍 Verificar datos.json
        run: |
          if [ ! -f datos.json ]; then
            echo "❌ Error: datos.json no fue generado"
            exit 1
          fi
          
          # Validar JSON
          python -c "import json; json.load(open('datos.json'))" || exit 1
          
          # Mostrar resumen
          echo "📊 Resumen del archivo generado:"
          ls -lh datos.json
          echo ""
          echo "📝 Primeras líneas:"
          head -20 datos.json

      # --------------------------------------
      # 6. COMMIT Y PUSH (si hay cambios)
      # --------------------------------------
      - name: 💾 Guardar cambios en repositorio
        id: commit
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Agregar archivos generados
          git add datos.json
          
          # Verificar si hay cambios reales (no solo timestamp)
          if git diff --cached --quiet; then
            echo "ℹ️ Sin cambios significativos detectados"
            echo "commit_realizado=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Commit con información detallada
          FECHA=$(date '+%Y-%m-%d %H:%M')
          REGISTROS="${{ steps.ejecucion.outputs.registros_total }}"
          
          git commit -m "🔄 Sincronización automática - $FECHA
          
          📊 Total registros: $REGISTROS
          ⏰ Próxima ejecución: $(date -d '+1 hour' '+%H:%M')"
          
          # Push con reintentos
          for i in 1 2 3; do
            git push && break
            echo "⚠️ Reintento $i..."
            sleep 2
          done
          
          echo "commit_realizado=true" >> $GITHUB_OUTPUT
          echo "✅ Cambios guardados exitosamente"

      # --------------------------------------
      # 7. LIMPIEZA DE BACKUPS ANTIGUOS
      # --------------------------------------
      - name: 🧹 Limpiar backups antiguos
        run: |
          # Mantener solo los últimos 5 backups
          ls -t datos_backup_*.json 2>/dev/null | tail -n +6 | xargs -r rm -f
          echo "🗑️ Backups antiguos eliminados (manteniendo últimos 5)"

      # --------------------------------------
      # 8. NOTIFICAR ESTADO (opcional - requiere configuración)
      # --------------------------------------
      - name: 📱 Notificar resultado (opcional)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Fallo en sincronización Notion - ${new Date().toISOString()}`,
              body: `El workflow de sincronización falló. Revisar logs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'automation']
            })
        continue-on-error: true

  # ==========================================
  # 🌐 DESPLIEGUE A GITHUB PAGES (OPCIONAL)
  # ==========================================
  desplegar:
    name: 🌐 Desplegar Dashboard
    needs: actualizar
    if: github.ref == 'refs/heads/main' && needs.actualizar.outputs.estado == 'success'
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🚀 Desplegar a GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: 'main.py,requirements.txt,datos_backup_*.json,.github'
          keep_files: true  # Mantener archivos no modificados
          commit_message: "🌐 Auto-deploy: Actualización de dashboard"

  # ==========================================
  # 📈 MONITOREO Y METRICAS
  # ==========================================
  metricas:
    name: 📈 Registrar Métricas
    needs: actualizar
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: 📊 Guardar métricas de ejecución
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const metrics = {
              timestamp: new Date().toISOString(),
              run_id: context.runId,
              status: '${{ needs.actualizar.outputs.estado }}',
              registros: ${{ needs.actualizar.outputs.registros_total || 0 }},
              duration: '${{ job.container }}'
            };
            
            // Guardar en archivo de métricas (opcional, para análisis posterior)
            console.log('📊 Métricas de ejecución:', metrics);
