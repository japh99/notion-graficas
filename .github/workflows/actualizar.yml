name: Actualizar Gráfica Notion

on:
  schedule:
    - cron: '0 * * * *'  # Se ejecuta cada hora
  workflow_dispatch:      # Permite ejecutarlo con botón manual

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Permiso para guardar archivos HTML

    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: pip install requests

      - name: Ejecutar Script de Python
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DB_INGRESOS: ${{ secrets.DB_INGRESOS }}
          DB_EGRESOS: ${{ secrets.DB_EGRESOS }}
          DB_TAREAS: ${{ secrets.DB_TAREAS }}
          DB_HABITOS: ${{ secrets.DB_HABITOS }}
        run: python main.py

      - name: Guardar páginas web en GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add *.html || true
          git commit -m "Actualizar graficas" || exit 0
          git push
