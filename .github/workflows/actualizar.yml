name: Actualizar Datos Notion

on:
  schedule:
    - cron: '0 * * * *'  # Se ejecuta automáticamente cada hora
  workflow_dispatch:      # Botón para ejecutar manualmente

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Permiso necesario para guardar el archivo datos.json

    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: pip install requests pytz

      - name: Ejecutar Script de Python (Extracción de Datos)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DB_INGRESOS: ${{ secrets.DB_INGRESOS }}
          DB_EGRESOS: ${{ secrets.DB_EGRESOS }}
          DB_TAREAS: ${{ secrets.DB_TAREAS }}
          DB_HABITOS: ${{ secrets.DB_HABITOS }}
          DB_POMODORO: ${{ secrets.DB_POMODORO }}
          DB_MEMENTO: ${{ secrets.DB_MEMENTO }}
          DB_SUBS: ${{ secrets.DB_SUBS }}
          DB_SUENO: ${{ secrets.DB_SUENO }}
          DB_COMPRAS: ${{ secrets.DB_COMPRAS }}
        run: python main.py

      - name: Guardar datos en GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add datos.json
          git commit -m "Actualizar datos.json desde Notion" || exit 0
          git push
