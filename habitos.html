<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Hábitos</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f5f5f5;
            --text-primary: #2c2c2c; --text-secondary: #6b6b6b;
            --accent: #06b6d4; --accent-light: #22d3ee;
            --border: #e0e0e0; --success: #10b981;
            --card-bg: #ffffff';
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #191919; --bg-secondary: '#252525';
                --text-primary: #ffffff; --text-secondary: #a0a0a0;
                --accent: #22d3ee; --accent-light: #67e8f9;
                --border: #2f2f2f; --success: #34d399;
                --card-bg: #202020;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
        .score-card { background: linear-gradient(135deg, var(--accent), var(--accent-light)); border-radius: 16px; padding: 2rem; color: white; text-align: center; margin-bottom: 2rem; }
        .score-value { font-size: 4rem; font-weight: 700; }
        .score-label { font-size: 1rem; opacity: 0.9; margin-top: 0.5rem; }
        .radar-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; margin-bottom: 2rem; max-width: 600px; margin-left: auto; margin-right: auto; }
        .radar-title { text-align: center; font-weight: 600; margin-bottom: 1.5rem; }
        .radar-wrapper { position: relative; height: 400px; }
        .habits-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .habit-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; display: flex; align-items: center; gap: 0.75rem; }
        .habit-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .habit-info { flex: 1; }
        .habit-name { font-weight: 600; font-size: 0.85rem; }
        .habit-status { font-size: 0.75rem; color: var(--text-secondary); }
        .habit-status.done { color: var(--success); }
        .loading { text-align: center; padding: 3rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Hábitos Diarios</h1>
        <p class="subtitle">Última actualización: <span id="lastUpdate">Cargando...</span></p>
        
        <div class="score-card">
            <div class="score-value" id="completionRate">0%</div>
            <div class="score-label">Cumplimiento Hoy</div>
        </div>
        
        <div class="radar-container">
            <div class="radar-title">🕸️ RADAR - Hábitos del Día</div>
            <div class="radar-wrapper"><canvas id="radarChart"></canvas></div>
        </div>
        
        <div class="habits-grid" id="habitsGrid"><div class="loading">Cargando...</div></div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('datos.json');
                const data = await response.json();
                document.getElementById('lastUpdate').textContent = data.metadata?.ultima_actualizacion || 'Desconocida';
                
                const habitos = data.datos?.habitos || [];
                processHabitos(habitos);
            } catch (error) {
                document.getElementById('habitsGrid').innerHTML = `<div style="color: var(--accent);">Error: ${error.message}</div>`;
            }
        }

        function processHabitos(habitos) {
            // ESTRUCTURA REAL (checkboxes):
            // • Meditacion (checkbox) → true
            // • Leer (checkbox) → true
            // • No Azúcar (checkbox) → true
            // • Fecha (date) → "2026-03-03"
            // • Dormí 7-8h (checkbox) → true
            // • Ejercicio (checkbox) → true
            // • Agradecer (checkbox) → true
            // • Agua 2LT (checkbox) → true
            // • Ducha Fría (checkbox) → false
            // • Diario (title) → "Prueba"
            
            if (habitos.length === 0) {
                document.getElementById('habitsGrid').innerHTML = '<div class="loading">No hay datos de hábitos</div>';
                return;
            }

            // Tomar el registro más reciente
            const ultimo = habitos[habitos.length - 1];
            const p = ultimo.properties || {};

            // Mapeo de hábitos con iconos
            const habitosMap = [
                { key: 'Meditacion', nombre: 'Meditación', icono: '🧘' },
                { key: 'Leer', nombre: 'Leer', icono: '📚' },
                { key: 'No Azúcar', nombre: 'No Azúcar', icono: '🚫🍬' },
                { key: 'Dormí 7-8h', nombre: 'Dormí 7-8h', icono: '😴' },
                { key: 'Ejercicio', nombre: 'Ejercicio', icono: '💪' },
                { key: 'Agradecer', nombre: 'Agradecer', icono: '🙏' },
                { key: 'Agua 2LT', nombre: 'Agua 2LT', icono: '💧' },
                { key: 'Ducha Fría', nombre: 'Ducha Fría', icono: '🚿' }
            ];

            const datosHabitos = habitosMap.map(h => ({
                ...h,
                hecho: p[h.key]?.checkbox === true
            }));

            const completados = datosHabitos.filter(h => h.hecho).length;
            const tasa = (completados / datosHabitos.length) * 100;

            document.getElementById('completionRate').textContent = tasa.toFixed(0) + '%';

            renderRadar(datosHabitos);
            renderHabits(datosHabitos);
        }

        function renderRadar(habitos) {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const textColor = isDark ? '#ffffff' : '#2c2c2c';
            const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';

            // Para el radar, usamos 100% si está hecho, 0% si no
            const dataValues = habitos.map(h => h.hecho ? 100 : 0);

            new Chart(document.getElementById('radarChart'), {
                type: 'radar',
                data: {
                    labels: habitos.map(h => h.nombre),
                    datasets: [{
                        label: 'Hoy',
                        data: dataValues,
                        backgroundColor: 'rgba(6, 182, 212, 0.2)',
                        borderColor: '#06b6d4',
                        pointBackgroundColor: '#06b6d4',
                        pointBorderColor: '#fff',
                        borderWidth: 2
                    }, {
                        label: 'Objetivo',
                        data: habitos.map(() => 100),
                        backgroundColor: 'transparent',
                        borderColor: 'rgba(148, 163, 184, 0.5)',
                        borderDash: [5, 5],
                        pointRadius: 0,
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 100,
                            grid: { color: gridColor },
                            angleLines: { color: gridColor },
                            pointLabels: { color: textColor, font: { size: 11 } },
                            ticks: { display: false }
                        }
                    }
                }
            });
        }

        function renderHabits(habitos) {
            document.getElementById('habitsGrid').innerHTML = habitos.map(h => `
                <div class="habit-card">
                    <div class="habit-icon">${h.icono}</div>
                    <div class="habit-info">
                        <div class="habit-name">${h.nombre}</div>
                        <div class="habit-status ${h.hecho ? 'done' : ''}">${h.hecho ? '✅ Completado' : '⬜ Pendiente'}</div>
                    </div>
                </div>
            `).join('');
        }

        loadData();
    </script>
</body>
</html>
