<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Hábitos</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f5f5f5;
            --text-primary: #2c2c2c; --text-secondary: #6b6b6b;
            --accent: #06b6d4; --accent-light: #22d3ee;
            --border: #e0e0e0; --success: #10b981;
            --card-bg: #ffffff;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #191919; --bg-secondary: #252525;
                --text-primary: #ffffff; --text-secondary: #a0a0a0;
                --accent: #22d3ee; --accent-light: #67e8f9;
                --border: #2f2f2f; --success: #34d399;
                --card-bg: #202020;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
        .consistency-score { background: linear-gradient(135deg, var(--accent), var(--accent-light)); border-radius: 16px; padding: 2rem; color: white; text-align: center; margin-bottom: 2rem; }
        .score-value { font-size: 4rem; font-weight: 700; }
        .score-label { font-size: 1rem; opacity: 0.9; margin-top: 0.5rem; }
        .radar-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; margin-bottom: 2rem; max-width: 600px; margin-left: auto; margin-right: auto; }
        .radar-title { text-align: center; font-weight: 600; margin-bottom: 1.5rem; }
        .radar-wrapper { position: relative; height: 400px; }
        .habits-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .habit-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; display: flex; align-items: center; gap: 1rem; }
        .habit-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-size: 1.25rem; }
        .habit-info { flex: 1; }
        .habit-name { font-weight: 600; font-size: 0.9rem; }
        .habit-streak { font-size: 0.75rem; color: var(--text-secondary); }
        .habit-checks { display: flex; gap: 0.25rem; margin-top: 0.25rem; }
        .check-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--bg-secondary); }
        .check-dot.done { background: var(--success); }
        .loading { text-align: center; padding: 3rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Hábitos Tracker</h1>
        <p class="subtitle">Última actualización: <span id="lastUpdate">Cargando...</span></p>
        
        <div class="consistency-score">
            <div class="score-value" id="consistencyScore">0%</div>
            <div class="score-label">Consistencia General (Últimos 7 días)</div>
        </div>
        
        <div class="radar-container">
            <div class="radar-title">🕸️ Radar de Hábitos por Categoría</div>
            <div class="radar-wrapper"><canvas id="radarChart"></canvas></div>
        </div>
        
        <div class="habits-grid" id="habitsGrid"><div class="loading">Cargando hábitos...</div></div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('datos.json');
                const data = await response.json();
                document.getElementById('lastUpdate').textContent = data.metadata?.ultima_actualizacion || 'Desconocida';
                
                // NOMBRES EXACTOS: Checkboxes (Meditacion, Leer, Ejercicio, Agua 2LT, etc.)
                const habitos = data.datos?.habitos || data.habitos || [];
                processHabits(habitos);
            } catch (error) {
                document.getElementById('habitsGrid').innerHTML = `<div style="color: var(--accent);">Error: ${error.message}</div>`;
            }
        }

        function processHabits(habitos) {
            const processed = habitos.map(h => {
                const props = h.properties || {};
                
                // Buscar TODOS los checkboxes (nombres pueden variar)
                const checks = [];
                const checkNames = ['Meditacion', 'Leer', 'Ejercicio', 'Agua_2LT', 'Agua 2LT', 'Journaling', 'Programar', 'Estudiar'];
                
                // También buscar cualquier propiedad que sea checkbox
                Object.keys(props).forEach(key => {
                    if (props[key]?.checkbox !== undefined) {
                        checks.push({
                            name: key,
                            done: props[key].checkbox
                        });
                    }
                });

                return {
                    nombre: props.Nombre?.title?.[0]?.plain_text || 'Hábito',
                    // Agrupar checks por categoría si existe, o usar nombre
                    categoria: props.Categoría?.select?.name || props.Nombre?.title?.[0]?.plain_text || 'General',
                    checks: checks,
                    totalChecks: checks.length,
                    doneChecks: checks.filter(c => c.done).length
                };
            });

            // Calcular consistencia global
            const totalChecks = processed.reduce((s, h) => s + h.totalChecks, 0);
            const totalDone = processed.reduce((s, h) => s + h.doneChecks, 0);
            const consistency = totalChecks > 0 ? (totalDone / totalChecks) * 100 : 0;

            document.getElementById('consistencyScore').textContent = consistency.toFixed(0) + '%';

            renderRadar(processed);
            renderHabits(processed);
        }

        function renderRadar(habitos) {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const textColor = isDark ? '#ffffff' : '#2c2c2c';
            const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';

            // Agrupar por categoría
            const porCategoria = {};
            habitos.forEach(h => {
                if (!porCategoria[h.categoria]) {
                    porCategoria[h.categoria] = { done: 0, total: 0 };
                }
                porCategoria[h.categoria].done += h.doneChecks;
                porCategoria[h.categoria].total += h.totalChecks;
            });

            const labels = Object.keys(porCategoria);
            const dataActual = labels.map(cat => {
                const c = porCategoria[cat];
                return c.total > 0 ? (c.done / c.total) * 100 : 0;
            });

            new Chart(document.getElementById('radarChart'), {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Cumplimiento %',
                        data: dataActual,
                        backgroundColor: 'rgba(6, 182, 212, 0.2)',
                        borderColor: '#06b6d4',
                        pointBackgroundColor: '#06b6d4',
                        pointBorderColor: '#fff',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 100,
                            grid: { color: gridColor },
                            angleLines: { color: gridColor },
                            pointLabels: { color: textColor, font: { size: 11 } },
                            ticks: { color: textColor, backdropColor: 'transparent', stepSize: 20 }
                        }
                    }
                }
            });
        }

        function renderHabits(habitos) {
            const icons = {
                'Meditacion': '🧘',
                'Leer': '📚',
                'Ejercicio': '💪',
                'Agua_2LT': '💧',
                'Agua 2LT': '💧',
                'Journaling': '📝',
                'Programar': '💻',
                'Estudiar': '📖'
            };

            document.getElementById('habitsGrid').innerHTML = habitos.map(h => {
                const pct = h.totalChecks > 0 ? (h.doneChecks / h.totalChecks) * 100 : 0;
                const icon = icons[h.nombre] || '✨';
                
                return `
                    <div class="habit-card">
                        <div class="habit-icon">${icon}</div>
                        <div class="habit-info">
                            <div class="habit-name">${h.nombre}</div>
                            <div class="habit-streak">${h.doneChecks} de ${h.totalChecks} días (${pct.toFixed(0)}%)</div>
                            <div class="habit-checks">
                                ${h.checks.map(c => `<div class="check-dot ${c.done ? 'done' : ''}"></div>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        loadData();
    </script>
</body>
</html>
