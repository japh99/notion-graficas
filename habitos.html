<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Hábitos</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>🎯 Hábitos Diarios</h1>
        <p class="subtitle">Última actualización: <span id="lastUpdate">Cargando...</span></p>
        
        <div class="score-card">
            <div class="score-value" id="completionRate">0%</div>
            <div class="score-label">Cumplimiento Hoy</div>
        </div>
        
        <div class="radar-container">
            <div class="radar-title">🕸️ RADAR - Hábitos del Día</div>
            <div class="radar-wrapper"><canvas id="radarChart"></canvas></div>
        </div>
        
        <div class="habits-grid" id="habitsGrid"><div class="loading">Cargando...</div></div>
    </div>    <script src="js/habitos.js"></script>
</body>
</html>
