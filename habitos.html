
    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="utf-8">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <style>
            body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display:flex; flex-direction:column; align-items:center; color: #EBEBEB; background-color: transparent; margin: 0; padding: 10px; }
            .chart-container { width: 100%; max-width: 320px; margin-top: 10px; }
            .insight-box { background-color: #2F2F2F; border-left: 5px solid #36a2eb; padding: 15px; border-radius: 8px; max-width: 400px; margin-top: 20px; font-size: 14px; line-height: 1.5; box-shadow: 0 4px 6px rgba(0,0,0,0.3); color: #EBEBEB; }
            h3 { margin-bottom: 0; color: #ffffff; font-weight: 600; text-align: center; }
            b { color: #ffffff; }
        </style>
    </head>
    <body>
        <h3>Consistencia de Hábitos</h3>
        <div class="chart-container"><canvas id="miGrafica"></canvas></div>
        <div class="insight-box">🏆 Tu hábito más fuerte es <b>Meditacion</b>.<br>⚠️ No descuides <b>Meditacion</b>, lo has cumplido menos veces.</div>
        <script>
            Chart.defaults.color = '#A0A0A0';
            new Chart(document.getElementById('miGrafica'), {
                type: 'bar',
                data: { labels: ["Meditacion", "Leer", "Ejercicio", "Agua 2LT", "Agradecer"], datasets:[{ data: [0, 0, 0, 0, 0], backgroundColor: ["#36a2eb"], borderWidth: 0 }] },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });
        </script>
    </body>
    </html>
