<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Ingresos</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f5f5f5;
            --text-primary: #2c2c2c; --text-secondary: #6b6b6b;
            --accent: #10b981; --accent-light: #34d399;
            --border: #e0e0e0; --card-bg: #ffffff;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #191919; --bg-secondary: #252525;
                --text-primary: #ffffff; --text-secondary: #a0a0a0;
                --accent: #34d399; --accent-light: #6ee7b7;
                --border: #2f2f2f; --card-bg: #202020;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .kpi-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; text-align: center; }
        .kpi-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .kpi-label { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .chart-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
        .chart-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
        .chart-wrapper { position: relative; height: 300px; }
        .recent-list { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
        .list-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
        .income-item { display: flex; justify-content: space-between; padding: 0.75rem; border-bottom: 1px solid var(--border); }
        .income-item:last-child { border-bottom: none; }
        .income-info { flex: 1; }
        .income-name { font-weight: 600; font-size: 0.9rem; }
        .income-meta { font-size: 0.75rem; color: var(--text-secondary); }
        .income-amount { font-weight: 700; color: var(--accent); font-size: 1.1rem; }
        .loading { text-align: center; padding: 3rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Ingresos</h1>
        <p class="subtitle">Última actualización: <span id="lastUpdate">Cargando...</span></p>
        
        <div class="kpi-grid" id="kpiGrid"><div class="loading">Cargando...</div></div>
        
        <div class="charts-grid">
            <div class="chart-container">
                <div class="chart-title">Por Mes</div>
                <div class="chart-wrapper"><canvas id="mesChart"></canvas></div>
            </div>
            <div class="chart-container">
                <div class="chart-title">Por Tipo (Nequi, etc.)</div>
                <div class="chart-wrapper"><canvas id="tipoChart"></canvas></div>
            </div>
        </div>
        
        <div class="recent-list">
            <div class="list-title">Últimos Ingresos</div>
            <div id="recentList"></div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('datos.json');
                const data = await response.json();
                document.getElementById('lastUpdate').textContent = data.metadata?.ultima_actualizacion || 'Desconocida';
                
                const ingresos = data.datos?.ingresos || [];
                processIngresos(ingresos);
            } catch (error) {
                document.getElementById('kpiGrid').innerHTML = `<div style="color: #ef4444;">Error: ${error.message}</div>`;
            }
        }

        function processIngresos(ingresos) {
            // ESTRUCTURA REAL:
            // • Fecha (date) → "2026-03-02"
            // • Motivo (select) → "Sueldo"
            // • Tipo (select) → "Nequi"
            // • Monto (number) → 510000
            // • Balance (relation)
            // • Mes (select) → "Febrero"
            // • Items (title) → "Nomina Hotel - Segunda Quin Feb"
            
            const processed = ingresos.map(i => {
                const p = i.properties || {};
                return {
                    fecha: p.Fecha?.date?.start,
                    motivo: p.Motivo?.select?.name || 'Sin motivo',
                    tipo: p.Tipo?.select?.name || 'Sin tipo',
                    monto: p.Monto?.number || 0,
                    mes: p.Mes?.select?.name || 'Sin mes',
                    items: p.Items?.title?.[0]?.plain_text || 'Sin descripción'
                };
            });

            const total = processed.reduce((s, i) => s + i.monto, 0);
            const promedio = processed.length ? total / processed.length : 0;
            const mesesUnicos = [...new Set(processed.map(i => i.mes))].length;

            document.getElementById('kpiGrid').innerHTML = `
                <div class="kpi-card">
                    <div class="kpi-value">$${(total / 1000000).toFixed(2)}M</div>
                    <div class="kpi-label">Total Ingresos</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-value">$${Math.round(promedio / 1000)}K</div>
                    <div class="kpi-label">Promedio</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-value">${processed.length}</div>
                    <div class="kpi-label">Transacciones</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-value">${mesesUnicos}</div>
                    <div class="kpi-label">Meses</div>
                </div>
            `;

            renderCharts(processed);
            renderList(processed);
        }

        function renderCharts(ingresos) {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const textColor = isDark ? '#ffffff' : '#2c2c2c';
            const gridColor = isDark ? '#2f2f2f' : '#e0e0e0';

            // Por Mes
            const porMes = {};
            ingresos.forEach(i => {
                porMes[i.mes] = (porMes[i.mes] || 0) + i.monto;
            });

            new Chart(document.getElementById('mesChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(porMes),
                    datasets: [{
                        label: 'Ingresos ($)',
                        data: Object.values(porMes),
                        backgroundColor: '#10b981',
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: gridColor }, ticks: { color: textColor, callback: v => '$' + (v / 1000) + 'K' } },
                        x: { grid: { display: false }, ticks: { color: textColor } }
                    }
                }
            });

            // Por Tipo (Nequi, etc.)
            const porTipo = {};
            ingresos.forEach(i => {
                porTipo[i.tipo] = (porTipo[i.tipo] || 0) + i.monto;
            });

            new Chart(document.getElementById('tipoChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(porTipo),
                    datasets: [{
                        data: Object.values(porTipo),
                        backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#8b5cf6']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'right', labels: { color: textColor } } }
                }
            });
        }

        function renderList(ingresos) {
            const recientes = ingresos.slice(-5).reverse();
            document.getElementById('recentList').innerHTML = recientes.map(i => `
                <div class="income-item">
                    <div class="income-info">
                        <div class="income-name">${i.items}</div>
                        <div class="income-meta">${i.motivo} • ${i.tipo} • ${i.mes}</div>
                    </div>
                    <div class="income-amount">+$${i.monto.toLocaleString()}</div>
                </div>
            `).join('');
        }

        loadData();
    </script>
</body>
</html>
