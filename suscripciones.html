<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Suscripciones</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f5f5f5;
            --text-primary: #2c2c2c; --text-secondary: #6b6b6b;
            --accent: #ec4899; --accent-light: #f472b6;
            --border: #e0e0e0; --card-bg: #ffffff;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #191919; --bg-secondary: #252525;
                --text-primary: #ffffff; --text-secondary: #a0a0a0;
                --accent: #f472b6; --accent-light: #fbcfe8;
                --border: #2f2f2f; --card-bg: #202020;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
        .burn-card { background: linear-gradient(135deg, var(--accent), var(--accent-light)); border-radius: 16px; padding: 2rem; color: white; text-align: center; margin-bottom: 2rem; }
        .burn-label { font-size: 0.9rem; opacity: 0.9; }
        .burn-value { font-size: 3rem; font-weight: 700; margin: 0.5rem 0; }
        .burn-sub { font-size: 0.85rem; opacity: 0.8; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.85rem; color: var(--text-secondary); }
        .chart-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
        .chart-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
        .chart-wrapper { position: relative; height: 300px; }
        .sub-list { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
        .list-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
        .sub-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; border-bottom: 1px solid var(--border); }
        .sub-item:last-child { border-bottom: none; }
        .sub-info { flex: 1; }
        .sub-name { font-weight: 600; }
        .sub-meta { font-size: 0.75rem; color: var(--text-secondary); }
        .sub-price { font-weight: 700; color: var(--accent); font-size: 1.1rem; }
        .sub-status { font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 10px; background: rgba(16, 185, 129, 0.2); color: #10b981; margin-left: 0.5rem; }
        .loading { text-align: center; padding: 3rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Suscripciones</h1>
        <p class="subtitle">Última actualización: <span id="lastUpdate">Cargando...</span></p>
        
        <div class="burn-card">
            <div class="burn-label">Burn Rate Mensual</div>
            <div class="burn-value" id="burnRate">$0</div>
            <div class="burn-sub">Dinero comprometido en suscripciones</div>
        </div>
        
        <div class="stats-grid" id="statsGrid"><div class="loading">Calculando...</div></div>
        
        <div class="chart-container">
            <div class="chart-title">Costo por Servicio</div>
            <div class="chart-wrapper"><canvas id="costChart"></canvas></div>
        </div>
        
        <div class="sub-list">
            <div class="list-title">Tus Suscripciones (12 activas)</div>
            <div id="subList"></div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('datos.json');
                const data = await response.json();
                document.getElementById('lastUpdate').textContent = data.metadata?.ultima_actualizacion || 'Desconocida';
                
                const subs = data.datos?.suscripciones || [];
                processSubs(subs);
            } catch (error) {
                document.getElementById('statsGrid').innerHTML = `<div style="color: var(--accent);">Error: ${error.message}</div>`;
            }
        }

        function processSubs(subs) {
            // ESTRUCTURA REAL:
            // • Notas (rich_text)
            // • Precio (number) → 40000
            // • Etiqueta Costo Mensual (rich_text)
            // • Etiqueta Fecha Renocación (rich_text)
            // • Prox Renovación (formula)
            // • Días restantes (formula) → "0 days left"
            // • Costo Anual (formula) → 480000
            // • Costo Mensual (formula) → 40000
            // • Categoría (relation)
            // • Este Mes? (formula)
            // • Status (select) → "Activo"
            // • Cuenta (select) → "Mensual"
            // • Fecha Renovación (date) → null
            // • Servicio (title) → "Barbería"
            
            const processed = subs.map(s => {
                const p = s.properties || {};
                return {
                    servicio: p.Servicio?.title?.[0]?.plain_text || 'Sin nombre',
                    precio: p.Precio?.number || 0,
                    costoMensual: p['Costo Mensual']?.formula?.number || p.Precio?.number || 0,
                    costoAnual: p['Costo Anual']?.formula?.number || 0,
                    status: p.Status?.select?.name || 'Desconocido',
                    cuenta: p.Cuenta?.select?.name || 'Mensual',
                    diasRestantes: p['Días restantes']?.formula?.string || '',
                    proxRenovacion: p['Prox Renovación']?.formula?.date?.start || null
                };
            }).filter(s => s.status === 'Activo');

            const mensualTotal = processed.reduce((s, sub) => s + sub.costoMensual, 0);
            const anualTotal = processed.reduce((s, sub) => s + sub.costoAnual, 0);

            document.getElementById('burnRate').textContent = '$' + (mensualTotal / 1000).toFixed(0) + 'K';
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${processed.length}</div>
                    <div class="stat-label">Servicios Activos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">$${(anualTotal / 1000000).toFixed(2)}M</div>
                    <div class="stat-label">Costo Anual</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">$${Math.round(mensualTotal / processed.length / 1000)}K</div>
                    <div class="stat-label">Promedio/Mes</div>
                </div>
            `;

            renderChart(processed);
            renderList(processed);
        }

        function renderChart(subs) {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const textColor = isDark ? '#ffffff' : '#2c2c2c';

            new Chart(document.getElementById('costChart'), {
                type: 'bar',
                data: {
                    labels: subs.map(s => s.servicio),
                    datasets: [{
                        label: 'Costo mensual ($)',
                        data: subs.map(s => s.costoMensual),
                        backgroundColor: '#ec4899',
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            grid: { color: isDark ? '#2f2f2f' : '#e0e0e0' }, 
                            ticks: { color: textColor, callback: v => '$' + (v / 1000) + 'K' } 
                        },
                        x: { 
                            grid: { display: false }, 
                            ticks: { color: textColor, font: { size: 10 } } 
                        }
                    }
                }
            });
        }

        function renderList(subs) {
            document.getElementById('subList').innerHTML = subs.sort((a, b) => b.precio - a.precio).map(s => `
                <div class="sub-item">
                    <div class="sub-info">
                        <div class="sub-name">
                            ${s.servicio}
                            <span class="sub-status">${s.status}</span>
                        </div>
                        <div class="sub-meta">${s.cuenta} • ${s.diasRestantes}</div>
                    </div>
                    <div class="sub-price">$${s.costoMensual.toLocaleString()}</div>
                </div>
            `).join('');
        }

        loadData();
    </script>
</body>
</html>
