<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Suscripciones</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>🔄 Suscripciones</h1>
        <p class="subtitle">Última actualización: <span id="lastUpdate">Cargando...</span></p>
        
        <div class="burn-card">
            <div class="burn-label">Burn Rate Mensual</div>
            <div class="burn-value" id="burnRate">$0</div>
            <div class="burn-sub">Dinero comprometido en suscripciones</div>
        </div>
        
        <div class="stats-grid" id="statsGrid"><div class="loading">Calculando...</div></div>
        
        <div class="chart-container">
            <div class="chart-title">Costo por Servicio</div>
            <div class="chart-wrapper"><canvas id="costChart"></canvas></div>
        </div>
        
        <div class="sub-list">
            <div class="list-title">Tus Suscripciones (12 activas)</div>
            <div id="subList"></div>
        </div>
    </div>    <script src="js/suscripciones.js"></script>
</body>
</html>
