<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Gestión de Suscripciones</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --text-primary: #2c2c2c;
            --text-secondary: #6b6b6b;
            --accent: #ec4899;
            --accent-light: #f472b6;
            --border: #e0e0e0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --card-bg: #ffffff;
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #191919;
                --bg-secondary: #252525;
                --text-primary: #ffffff;
                --text-secondary: #a0a0a0;
                --accent: #f472b6;
                --accent-light: #fbcfe8;
                --border: #2f2f2f;
                --success: #34d399;
                --warning: #fbbf24;
                --danger: #f87171;
                --card-bg: #202020;
            }
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
        
        .cost-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .cost-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }
        
        .cost-period { font-size: 0.75rem; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 0.5rem; }
        .cost-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .cost-detail { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .chart-container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }
        
        .chart-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
        .chart-wrapper { position: relative; height: 300px; }
        
        .subs-list {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }
        
        .sub-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .sub-item:last-child { border-bottom: none; }
        
        .sub-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        
        .sub-info { flex: 1; }
        .sub-name { font-weight: 600; margin-bottom: 0.25rem; }
        .sub-meta { font-size: 0.8rem; color: var(--text-secondary); }
        
        .sub-cost {
            text-align: right;
        }
        
        .sub-price { font-weight: 700; color: var(--accent); }
        .sub-period { font-size: 0.75rem; color: var(--text-secondary); }
        
        .sub-status {
            font-size: 0.7rem;
            padding: 0.25rem 0.5rem;
            border-radius: 12px;
            margin-left: 0.5rem;
        }
        
        .status-active { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .status-warning { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .status-cancel { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        
        .renewal-alert {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid var(--warning);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .loading { text-align: center; padding: 3rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Centro de Suscripciones</h1>
        <p class="subtitle">Última actualización: <span id="lastUpdate">Cargando...</span></p>
        
        <div id="renewalAlert"></div>
        
        <div class="cost-summary" id="costSummary">
            <div class="loading">Calculando gastos...</div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-container">
                <div class="chart-title">Distribución por Categoría</div>
                <div class="chart-wrapper">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
            
            <div class="chart-container">
                <div class="chart-title">Comparación Mensual vs Anual</div>
                <div class="chart-wrapper">
                    <canvas id="comparisonChart"></canvas>
                </div>
            </div>
        </div>
        
        <div class="subs-list">
            <div class="chart-title">Tus Suscripciones Activas</div>
            <div id="subscriptionsList"></div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('datos.json');
                const data = await response.json();
                
                document.getElementById('lastUpdate').textContent = 
                    data.metadata?.ultima_actualizacion || 'Desconocida';
                
                const subs = data.datos?.suscripciones || data.suscripciones || [];
                processSubscriptions(subs);
            } catch (error) {
                document.getElementById('costSummary').innerHTML = 
                    `<div style="color: var(--danger);">Error: ${error.message}</div>`;
            }
        }
        
        function processSubscriptions(subs) {
            const processed = subs.map(s => {
                const props = s.properties || {};
                const frecuencia = props.Frecuencia?.select?.name || 'Mensual';
                const costo = props.Costo?.number || props.Monto?.number || 0;
                
                // Normalizar a mensual
                const costoMensual = frecuencia === 'Anual' ? costo / 12 : 
                                    frecuencia === 'Trimestral' ? costo / 3 : costo;
                
                return {
                    nombre: props.Nombre?.title?.[0]?.plain_text || 'Suscripción',
                    costo: costo,
                    costoMensual: costoMensual,
                    frecuencia: frecuencia,
                    categoria: props.Categoría?.select?.name || 'General',
                    proximoPago: props.Proximo_pago?.date?.start,
                    estado: props.Estado?.select?.name || 'Activa',
                    icon: props.Icono?.rich_text?.[0]?.plain_text || '📱'
                };
            }).filter(s => s.estado === 'Activa');
            
            renderCosts(processed);
            renderCharts(processed);
            renderList(processed);
            checkRenewals(processed);
        }
        
        function renderCosts(subs) {
            const mensual = subs.reduce((s, sub) => s + sub.costoMensual, 0);
            const anual = mensual * 12;
            
            document.getElementById('costSummary').innerHTML = `
                <div class="cost-card">
                    <div class="cost-period">Gasto Mensual</div>
                    <div class="cost-value">$${Math.round(mensual / 1000)}K</div>
                    <div class="cost-detail">${subs.length} suscripciones</div>
                </div>
                <div class="cost-card">
                    <div class="cost-period">Gasto Anual</div>
                    <div class="cost-value">$${(anual / 1000000).toFixed(2)}M</div>
                    <div class="cost-detail">Proyección total</div>
                </div>
                <div class="cost-card">
                    <div class="cost-period">Promedio/Servicio</div>
                    <div class="cost-value">$${Math.round(mensual / subs.length / 1000)}K</div>
                    <div class="cost-detail">Por suscripción</div>
                </div>
                <div class="cost-card">
                    <div class="cost-period">% del Ingreso</div>
                    <div class="cost-value">${(mensual / 5000000 * 100).toFixed(1)}%</div>
                    <div class="cost-detail">Estimado</div>
                </div>
            `;
        }
        
        function renderCharts(subs) {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const textColor = isDark ? '#ffffff' : '#2c2c2c';
            
            // Por categoría
            const porCategoria = {};
            subs.forEach(s => {
                porCategoria[s.categoria] = (porCategoria[s.categoria] || 0) + s.costoMensual;
            });
            
            new Chart(document.getElementById('categoryChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(porCategoria),
                    datasets: [{
                        data: Object.values(porCategoria),
                        backgroundColor: ['#ec4899', '#8b5cf6', '#3b82f6', '#10b981', '#f59e0b']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right', labels: { color: textColor } }
                    }
                }
            });
            
            // Comparación mensual vs anual
            const mensuales = subs.filter(s => s.frecuencia === 'Mensual').reduce((s, sub) => s + sub.costo, 0);
            const anuales = subs.filter(s => s.frecuencia === 'Anual').reduce((s, sub) => s + sub.costo / 12, 0);
            
            new Chart(document.getElementById('comparisonChart'), {
                type: 'bar',
                data: {
                    labels: ['Mensuales', 'Anuales (prorrateado)', 'Trimestrales'],
                    datasets: [{
                        label: 'Costo mensual equivalente',
                        data: [
                            mensuales,
                            anuales,
                            subs.filter(s => s.frecuencia === 'Trimestral').reduce((s, sub) => s + sub.costo / 3, 0)
                        ],
                        backgroundColor: ['#ec4899', '#8b5cf6', '#f59e0b'],
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            ticks: { 
                                color: textColor,
                                callback: v => '$' + (v / 1000) + 'K'
                            } 
                        },
                        x: { ticks: { color: textColor } }
                    }
                }
            });
        }
        
        function renderList(subs) {
            document.getElementById('subscriptionsList').innerHTML = subs.sort((a, b) => b.costoMensual - a.costoMensual).map(s => `
                <div class="sub-item">
                    <div class="sub-icon">${s.icon}</div>
                    <div class="sub-info">
                        <div class="sub-name">
                            ${s.nombre}
                            <span class="sub-status status-active">${s.estado}</span>
                        </div>
                        <div class="sub-meta">${s.categoria} • Próximo: ${s.proximoPago || 'No definido'}</div>
                    </div>
                    <div class="sub-cost">
                        <div class="sub-price">$${s.costo.toLocaleString()}</div>
                        <div class="sub-period">/${s.frecuencia.toLowerCase()}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function checkRenewals(subs) {
            const hoy = new Date();
            const proximas = subs.filter(s => {
                if (!s.proximoPago) return false;
                const dias = Math.ceil((new Date(s.proximoPago) - hoy) / (1000 * 60 * 60 * 24));
                return dias <= 7 && dias >= 0;
            });
            
            if (proximas.length > 0) {
                document.getElementById('renewalAlert').innerHTML = `
                    <div class="renewal-alert">
                        <span>⚠️</span>
                        <div>
                            <strong>Renovaciones próximas:</strong> 
                            ${proximas.length} suscripción(es) se renuevan esta semana 
                            (${proximas.map(p => p.nombre).join(', ')})
                        </div>
                    </div>
                `;
            }
        }
        
        loadData();
    </script>
</body>
</html>
