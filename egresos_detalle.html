<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Egresos</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f5f5f5;
            --text-primary: #2c2c2c; --text-secondary: #6b6b6b;
            --accent: #ef4444; --accent-light: #f87171;
            --border: #e0e0e0; --warning: #f59e0b;
            --card-bg: #ffffff';
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #191919; --bg-secondary: '#252525';
                --text-primary: #ffffff; --text-secondary: #a0a0a0;
                --accent: #f87171; --accent-light: #fca5a5;
                --border: #2f2f2f; --warning: #fbbf24;
                --card-bg: #202020;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.85rem; color: var(--text-secondary); }
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
        @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }
        .chart-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
        .chart-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; text-align: center; }
        .chart-wrapper { position: relative; height: 350px; }
        .expense-list { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
        .list-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
        .expense-item { display: flex; justify-content: space-between; padding: 0.75rem; border-bottom: 1px solid var(--border); }
        .expense-item:last-child { border-bottom: none; }
        .expense-info { flex: 1; }
        .expense-name { font-weight: 600; font-size: 0.9rem; }
        .expense-meta { font-size: 0.75rem; color: var(--text-secondary); }
        .expense-amount { font-weight: 700; color: var(--accent); }
        .loading { text-align: center; padding: 3rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <h1>💸 Egresos</h1>
        <p class="subtitle">Última actualización: <span id="lastUpdate">Cargando...</span></p>
        
        <div class="stats-grid" id="statsGrid"><div class="loading">Cargando...</div></div>
        
        <div class="charts-grid">
            <div class="chart-container">
                <div class="chart-title">🎯 POLAR AREA - Por Tipo de Gasto</div>
                <div class="chart-wrapper"><canvas id="polarChart"></canvas></div>
            </div>
            <div class="chart-container">
                <div class="chart-title">Por Mes</div>
                <div class="chart-wrapper"><canvas id="mesChart"></canvas></div>
            </div>
        </div>
        
        <div class="expense-list">
            <div class="list-title">Últimos Egresos</div>
            <div id="expenseList"></div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('datos.json');
                const data = await response.json();
                document.getElementById('lastUpdate').textContent = data.metadata?.ultima_actualizacion || 'Desconocida';
                
                const egresos = data.datos?.egresos || [];
                processEgresos(egresos);
            } catch (error) {
                document.getElementById('statsGrid').innerHTML = `<div style="color: var(--accent);">Error: ${error.message}</div>`;
            }
        }

        function processEgresos(egresos) {
            // ESTRUCTURA REAL:
            // • Balance (relation)
            // • Tipo (multi_select) → ["Vivienda"]
            // • Fecha (date) → "2026-03-03"
            // • Monto (number) → 500000
            // • Forty Box (select) → "Nequi"
            // • Mes (select) → "Marzo"
            // • Items (title) → "Arriendo Mes de Febrero"
            
            const processed = egresos.map(e => {
                const p = e.properties || {};
                return {
                    tipos: p.Tipo?.multi_select?.map(t => t.name) || ['Sin tipo'],
                    fecha: p.Fecha?.date?.start,
                    monto: p.Monto?.number || 0,
                    fortyBox: p['Forty Box']?.select?.name || 'Sin cuenta',
                    mes: p.Mes?.select?.name || 'Sin mes',
                    items: p.Items?.title?.[0]?.plain_text || 'Sin descripción'
                };
            });

            const total = processed.reduce((s, e) => s + e.monto, 0);
            const promedio = processed.length ? total / processed.length : 0;

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">$${(total / 1000000).toFixed(2)}M</div>
                    <div class="stat-label">Total Egresos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">$${Math.round(promedio / 1000)}K</div>
                    <div class="stat-label">Promedio</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${processed.length}</div>
                    <div class="stat-label">Transacciones</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${new Set(processed.flatMap(e => e.tipos)).size}</div>
                    <div class="stat-label">Categorías</div>
                </div>
            `;

            renderPolarChart(processed);
            renderMesChart(processed);
            renderList(processed);
        }

        function renderPolarChart(egresos) {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const textColor = isDark ? '#ffffff' : '#2c2c2c';

            // Agrupar por tipo (multi_select puede tener varios)
            const porTipo = {};
            egresos.forEach(e => {
                e.tipos.forEach(tipo => {
                    porTipo[tipo] = (porTipo[tipo] || 0) + e.monto;
                });
            });

            const sorted = Object.entries(porTipo).sort((a, b) => b[1] - a[1]);
            const colors = [
                'rgba(239, 68, 68, 0.7)', 'rgba(245, 158, 11, 0.7)',
                'rgba(16, 185, 129, 0.7)', 'rgba(59, 130, 246, 0.7)',
                'rgba(139, 92, 246, 0.7)', 'rgba(236, 72, 153, 0.7)',
                'rgba(6, 182, 212, 0.7)', 'rgba(249, 115, 22, 0.7)'
            ];

            new Chart(document.getElementById('polarChart'), {
                type: 'polarArea',
                data: {
                    labels: sorted.map(s => s[0]),
                    datasets: [{
                        data: sorted.map(s => s[1]),
                        backgroundColor: colors.slice(0, sorted.length),
                        borderColor: isDark ? '#202020' : '#ffffff',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: { color: textColor }
                        }
                    },
                    scales: {
                        r: {
                            grid: { color: isDark ? '#2f2f2f' : '#e0e0e0' },
                            pointLabels: { color: textColor },
                            ticks: { color: textColor, backdropColor: 'transparent', callback: v => '$' + (v / 1000) + 'K' }
                        }
                    }
                }
            });
        }

        function renderMesChart(egresos) {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const textColor = isDark ? '#ffffff' : '#2c2c2c';
            const gridColor = isDark ? '#2f2f2f' : '#e0e0e0';

            const porMes = {};
            egresos.forEach(e => {
                porMes[e.mes] = (porMes[e.mes] || 0) + e.monto;
            });

            new Chart(document.getElementById('mesChart'), {
                type: 'line',
                data: {
                    labels: Object.keys(porMes),
                    datasets: [{
                        label: 'Gastos',
                        data: Object.values(porMes),
                        borderColor: '#ef4444',
                        backgroundColor: 'rgba(239, 68, 68, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: gridColor }, ticks: { color: textColor, callback: v => '$' + (v / 1000) + 'K' } },
                        x: { grid: { display: false }, ticks: { color: textColor } }
                    }
                }
            });
        }

        function renderList(egresos) {
            const recientes = egresos.slice(-5).reverse();
            document.getElementById('expenseList').innerHTML = recientes.map(e => `
                <div class="expense-item">
                    <div class="expense-info">
                        <div class="expense-name">${e.items}</div>
                        <div class="expense-meta">${e.tipos.join(', ')} • ${e.fortyBox} • ${e.mes}</div>
                    </div>
                    <div class="expense-amount">-$${e.monto.toLocaleString()}</div>
                </div>
            `).join('');
        }

        loadData();
    </script>
</body>
</html>
