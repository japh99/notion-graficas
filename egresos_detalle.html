<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Egresos</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f5f5f5;
            --text-primary: #2c2c2c; --text-secondary: #6b6b6b;
            --accent: #ef4444; --accent-light: #f87171;
            --border: #e0e0e0; --warning: #f59e0b;
            --card-bg: #ffffff;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #191919; --bg-secondary: #252525;
                --text-primary: #ffffff; --text-secondary: #a0a0a0;
                --accent: #f87171; --accent-light: #fca5a5;
                --border: #2f2f2f; --warning: #fbbf24;
                --card-bg: #202020;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.85rem; color: var(--text-secondary); }
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
        @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }
        .chart-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
        .chart-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; text-align: center; }
        .chart-wrapper { position: relative; height: 350px; }
        .ant-spending { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
        .ant-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .ant-total { font-size: 1.25rem; font-weight: 700; color: var(--warning); }
        .ant-item { display: flex; justify-content: space-between; padding: 0.5rem; background: var(--bg-secondary); border-radius: 6px; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .loading { text-align: center; padding: 3rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <h1>💸 Análisis de Egresos</h1>
        <p class="subtitle">Última actualización: <span id="lastUpdate">Cargando...</span></p>
        
        <div class="stats-grid" id="statsGrid"><div class="loading">Procesando...</div></div>
        
        <div class="charts-grid">
            <div class="chart-container">
                <div class="chart-title">🎯 Distribución Polar por Tipo</div>
                <div class="chart-wrapper"><canvas id="polarChart"></canvas></div>
            </div>
            <div class="chart-container">
                <div class="chart-title">📊 Por Mes</div>
                <div class="chart-wrapper"><canvas id="monthChart"></canvas></div>
            </div>
        </div>
        
        <div class="ant-spending">
            <div class="ant-header">
                <div class="chart-title">🐜 Gastos Hormiga (pequeños montos)</div>
                <div class="ant-total" id="antTotal">$0</div>
            </div>
            <div id="antList"></div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('datos.json');
                const data = await response.json();
                document.getElementById('lastUpdate').textContent = data.metadata?.ultima_actualizacion || 'Desconocida';
                
                // NOMBRES EXACTOS: Monto, Tipo (multi_select), Mes, Ahorro, Items
                const egresos = data.datos?.egresos || data.egresos || [];
                processExpenses(egresos);
            } catch (error) {
                document.getElementById('statsGrid').innerHTML = `<div style="color: var(--accent);">Error: ${error.message}</div>`;
            }
        }

        function processExpenses(egresos) {
            const processed = egresos.map(e => {
                const props = e.properties || {};
                
                // NOMBRES EXACTOS DE TUS COLUMNAS:
                const tipos = props.Tipo?.multi_select?.map(t => t.name) || ['Sin tipo'];
                
                return {
                    monto: props.Monto?.number || 0,
                    tipos: tipos, // Array porque es multi_select
                    tipoPrincipal: tipos[0],
                    mes: props.Mes?.select?.name || 'Sin mes',
                    ahorro: props.Ahorro?.select?.name || 'No',
                    item: props.Items?.title?.[0]?.plain_text || 'Sin item'
                };
            });

            const total = processed.reduce((s, e) => s + e.monto, 0);
            const esAhorro = processed.filter(e => e.ahorro === 'Sí' || e.ahorro === 'Si').reduce((s, e) => s + e.monto, 0);
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">$${(total / 1000000).toFixed(2)}M</div>
                    <div class="stat-label">Total Egresos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: var(--warning);">$${(esAhorro / 1000000).toFixed(2)}M</div>
                    <div class="stat-label">Destinado a Ahorro</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${processed.length}</div>
                    <div class="stat-label">Transacciones</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${new Set(processed.map(e => e.tipoPrincipal)).size}</div>
                    <div class="stat-label">Categorías</div>
                </div>
            `;

            renderPolarChart(processed);
            renderMonthChart(processed);
            renderAntSpending(processed);
        }

        function renderPolarChart(egresos) {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const textColor = isDark ? '#ffffff' : '#2c2c2c';

            // Agrupar por Tipo (usando multi_select)
            const porTipo = {};
            egresos.forEach(e => {
                e.tipos.forEach(tipo => {
                    porTipo[tipo] = (porTipo[tipo] || 0) + e.monto;
                });
            });

            const sorted = Object.entries(porTipo).sort((a, b) => b[1] - a[1]).slice(0, 8);
            const colors = [
                'rgba(239, 68, 68, 0.7)', 'rgba(245, 158, 11, 0.7)',
                'rgba(16, 185, 129, 0.7)', 'rgba(59, 130, 246, 0.7)',
                'rgba(139, 92, 246, 0.7)', 'rgba(236, 72, 153, 0.7)',
                'rgba(6, 182, 212, 0.7)', 'rgba(249, 115, 22, 0.7)'
            ];

            new Chart(document.getElementById('polarChart'), {
                type: 'polarArea',
                data: {
                    labels: sorted.map(s => s[0]),
                    datasets: [{
                        data: sorted.map(s => s[1]),
                        backgroundColor: colors,
                        borderColor: isDark ? '#202020' : '#ffffff',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                color: textColor,
                                generateLabels: chart => {
                                    const data = chart.data;
                                    const total = data.datasets[0].data.reduce((a, b) => a + b, 0);
                                    return data.labels.map((label, i) => ({
                                        text: `${label}: ${((data.datasets[0].data[i] / total) * 100).toFixed(1)}%`,
                                        fillStyle: data.datasets[0].backgroundColor[i],
                                        hidden: false,
                                        index: i
                                    }));
                                }
                            }
                        }
                    },
                    scales: {
                        r: {
                            grid: { color: isDark ? '#2f2f2f' : '#e0e0e0' },
                            pointLabels: { color: textColor },
                            ticks: { color: textColor, backdropColor: 'transparent', callback: v => '$' + (v / 1000) + 'K' }
                        }
                    }
                }
            });
        }

        function renderMonthChart(egresos) {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const textColor = isDark ? '#ffffff' : '#2c2c2c';
            const gridColor = isDark ? '#2f2f2f' : '#e0e0e0';

            const porMes = {};
            egresos.forEach(e => {
                porMes[e.mes] = (porMes[e.mes] || 0) + e.monto;
            });

            new Chart(document.getElementById('monthChart'), {
                type: 'line',
                data: {
                    labels: Object.keys(porMes),
                    datasets: [{
                        label: 'Gastos',
                        data: Object.values(porMes),
                        borderColor: '#ef4444',
                        backgroundColor: 'rgba(239, 68, 68, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: gridColor }, ticks: { color: textColor, callback: v => '$' + (v / 1000) + 'K' } },
                        x: { grid: { display: false }, ticks: { color: textColor } }
                    }
                }
            });
        }

        function renderAntSpending(egresos) {
            // Gastos hormiga: montos menores a $20,000
            const hormiga = egresos.filter(e => e.monto < 20000);
            const totalHormiga = hormiga.reduce((s, e) => s + e.monto, 0);

            document.getElementById('antTotal').textContent = '$' + (totalHormiga / 1000).toFixed(0) + 'K';

            // Agrupar por tipo
            const porTipo = {};
            hormiga.forEach(h => {
                porTipo[h.tipoPrincipal] = (porTipo[h.tipoPrincipal] || 0) + h.monto;
            });

            const sorted = Object.entries(porTipo).sort((a, b) => b[1] - a[1]).slice(0, 5);

            document.getElementById('antList').innerHTML = sorted.length ? sorted.map(([tipo, monto]) => `
                <div class="ant-item">
                    <span>${tipo}</span>
                    <strong>$${(monto / 1000).toFixed(0)}K</strong>
                </div>
            `).join('') : '<div style="text-align: center; color: var(--text-secondary);">No se detectaron gastos hormiga</div>';
        }

        loadData();
    </script>
</body>
</html>
