<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Auditoría Pro</title>
    
    <!-- 1. TAILWIND CSS (Diseño Automático) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. CHART.JS (Gráficos) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Configuración de Colores Tailwind -->
    <script>
        tailwind.config = {
            darkMode: 'class', // Se adapta al modo oscuro
            theme: {
                extend: {
                    colors: {
                        notion: { bg: '#191919', card: '#202020', border: '#2f2f2f', text: '#e5e5e5' },
                        cat: { work: '#3b82f6', pers: '#10b981', biz: '#f59e0b', other: '#9ca3af' },
                        pom: { red: '#ef4444' }
                    }
                }
            }
        }
    </script>
    <style>
        /* Animación de carga suave */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-drop { animation: fadeIn 0.6s ease-out forwards; }
    </style>
</head>
<body class="bg-transparent text-gray-800 dark:text-gray-200 p-4 font-sans antialiased">

    <!-- LOADER -->
    <div id="loader" class="fixed inset-0 flex items-center justify-center bg-white dark:bg-notion-bg z-50">
        <div class="text-center">
            <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-2"></div>
            <p class="text-xs font-bold uppercase tracking-widest opacity-70">Sincronizando...</p>
        </div>
    </div>

    <div class="max-w-5xl mx-auto space-y-6">
        
        <!-- HEADER -->
        <div class="flex flex-wrap justify-between items-center border-b border-gray-200 dark:border-notion-border pb-4">
            <div>
                <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-500">
                    🍅 AUDITORÍA DE TIEMPO
                </h1>
                <p class="text-xs text-gray-500 mt-1">Análisis de rendimiento JAPH 2026</p>
            </div>
            
            <!-- SELECTOR DE PERIODO -->
            <div class="flex bg-gray-100 dark:bg-notion-border p-1 rounded-xl">
                <button onclick="update('day')" class="period-btn px-4 py-1.5 rounded-lg text-xs font-bold transition-all hover:bg-white dark:hover:bg-notion-card">DÍA</button>
                <button onclick="update('week')" class="period-btn px-4 py-1.5 rounded-lg text-xs font-bold transition-all hover:bg-white dark:hover:bg-notion-card">SEMANA</button>
                <button onclick="update('month')" class="period-btn px-4 py-1.5 rounded-lg text-xs font-bold transition-all hover:bg-white dark:hover:bg-notion-card">MES</button>
            </div>
        </div>

        <!-- KPIs GRID -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="kpi-container">
            <!-- Se llenará con JS -->
        </div>

        <!-- MAIN CHARTS -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Gráfico 1: Stacked (Ocupa 2 espacios) -->
            <div class="lg:col-span-2 bg-white dark:bg-notion-card border border-gray-200 dark:border-notion-border rounded-2xl p-5 shadow-sm animate-drop">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Cronología de Enfoque</h3>
                <div class="h-72 w-full relative">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>

            <!-- Gráfico 2: Dona -->
            <div class="bg-white dark:bg-notion-card border border-gray-200 dark:border-notion-border rounded-2xl p-5 shadow-sm animate-drop" style="animation-delay: 0.1s">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Distribución</h3>
                <div class="h-72 w-full relative">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>

        <!-- TABLA DE DETALLES -->
        <div class="bg-white dark:bg-notion-card border border-gray-200 dark:border-notion-border rounded-2xl p-5 shadow-sm animate-drop" style="animation-delay: 0.2s">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Desglose por Proyecto</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="text-xs text-gray-500 uppercase bg-gray-50 dark:bg-notion-border/50">
                        <tr>
                            <th class="px-4 py-3 rounded-l-lg">Proyecto</th>
                            <th class="px-4 py-3">Categoría</th>
                            <th class="px-4 py-3">Tiempo Total</th>
                            <th class="px-4 py-3 rounded-r-lg text-right">Eficiencia</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-100 dark:divide-notion-border">
                        <!-- Se llena con JS -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- LÓGICA JAVASCRIPT -->
    <script>
        let rawData = [];
        let chartInstances = {};
        const COLORS = { 'Trabajo': '#3b82f6', 'Negocios': '#f59e0b', 'Personal': '#10b981', 'Otro': '#9ca3af' };

        // 1. INICIALIZACIÓN
        async function init() {
            try {
                // Intenta cargar datos locales (simulando fetch)
                const res = await fetch('datos.json');
                const json = await res.json();
                rawData = json.pomodoro || json.datos?.pomodoro || [];
                
                document.getElementById('loader').classList.add('hidden');
                update('week'); // Vista por defecto
            } catch (e) {
                document.getElementById('loader').innerHTML = `<p class="text-red-500">Error: No se encontró datos.json</p>`;
            }
        }

        // 2. ACTUALIZAR VISTA
        function update(period) {
            // Estilos de botones
            document.querySelectorAll('.period-btn').forEach(b => {
                const isActive = b.innerText.toLowerCase() === (period === 'day' ? 'día' : period === 'week' ? 'semana' : 'mes');
                b.className = `period-btn px-4 py-1.5 rounded-lg text-xs font-bold transition-all ${isActive ? 'bg-white dark:bg-notion-card text-blue-500 shadow-sm' : 'text-gray-500 hover:bg-gray-200 dark:hover:bg-notion-border'}`;
            });

            const data = processData(period);
            renderKPIs(data);
            renderCharts(data, period);
            renderTable(data);
        }

        // 3. PROCESAMIENTO DE DATOS INTELIGENTE
        function processData(period) {
            const now = new Date();
            const limit = period === 'day' ? 0 : period === 'week' ? 6 : 29;
            
            let stats = { totalF: 0, totalB: 0, sessions: 0 };
            let projects = {};
            let timeline = {}; // Para el gráfico X

            // Inicializar timeline
            for(let i=limit; i>=0; i--) {
                const d = new Date(); d.setDate(now.getDate() - i);
                timeline[d.toISOString().split('T')[0]] = { 'Trabajo':0, 'Negocios':0, 'Personal':0, 'Otro':0 };
            }

            rawData.forEach(item => {
                const p = item.properties;
                const dStr = p['Inicio 🍅']?.date?.start || item.created_time;
                const dKey = dStr.split('T')[0];

                if (timeline[dKey]) {
                    // Datos
                    const focus = p['Enfoque 🍅']?.formula?.number || p['Tiempo']?.number || 0;
                    const desc = p['Descansos ☕️']?.formula?.number || 0;
                    
                    // Categorización
                    let type = (p['Tipo']?.select?.name || "").toLowerCase();
                    let name = (p.Name?.title[0]?.plain_text || "Sin Nombre").toLowerCase();
                    
                    let cat = 'Otro';
                    if (type.includes('trabajo') || name.includes('trabajo') || name.includes('cliente')) cat = 'Trabajo';
                    else if (type.includes('negocio') || name.includes('negocio') || name.includes('ventas')) cat = 'Negocios';
                    else if (type.includes('personal') || name.includes('gym') || name.includes('leer')) cat = 'Personal';

                    if (focus > 0) {
                        stats.totalF += focus;
                        stats.totalB += desc;
                        stats.sessions++;
                        
                        // Agregar a Timeline
                        timeline[dKey][cat] += focus;

                        // Agregar a Proyectos
                        const realName = p.Name?.title[0]?.plain_text || "Sin Nombre";
                        if(!projects[realName]) projects[realName] = { cat, focus:0, desc:0 };
                        projects[realName].focus += focus;
                        projects[realName].desc += desc;
                    }
                }
            });

            return {
                stats,
                timelineLabels: Object.keys(timeline).map(d => d.slice(5)), // MM-DD
                timelineData: {
                    'Trabajo': Object.values(timeline).map(v => v.Trabajo),
                    'Negocios': Object.values(timeline).map(v => v.Negocios),
                    'Personal': Object.values(timeline).map(v => v.Personal)
                },
                projects
            };
        }

        // 4. RENDERIZADO
        function renderKPIs(d) {
            const container = document.getElementById('kpi-container');
            const efficiency = Math.round((d.stats.totalF / (d.stats.totalF + d.stats.totalB || 1)) * 100);
            
            const kpi = (lbl, val, col) => `
                <div class="bg-white dark:bg-notion-card border border-gray-200 dark:border-notion-border rounded-2xl p-4 flex flex-col items-center justify-center">
                    <span class="text-2xl font-black ${col}">${val}</span>
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mt-1">${lbl}</span>
                </div>`;

            container.innerHTML = `
                ${kpi('Horas Enfoque', (d.stats.totalF/60).toFixed(1) + 'h', 'text-blue-500')}
                ${kpi('Horas Descanso', (d.stats.totalB/60).toFixed(1) + 'h', 'text-green-500')}
                ${kpi('Sesiones', d.stats.sessions, 'text-gray-500 dark:text-gray-300')}
                ${kpi('Eficiencia', efficiency + '%', efficiency > 80 ? 'text-green-500' : 'text-orange-500')}
            `;
        }

        function renderCharts(d, period) {
            const ctx1 = document.getElementById('mainChart').getContext('2d');
            const ctx2 = document.getElementById('pieChart').getContext('2d');
            
            if(chartInstances.main) chartInstances.main.destroy();
            if(chartInstances.pie) chartInstances.pie.destroy();

            // Stacked Bar
            chartInstances.main = new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: d.timelineLabels,
                    datasets: Object.keys(COLORS).map(k => ({
                        label: k, data: d.timelineData[k], backgroundColor: COLORS[k], borderRadius: 4, stack: 'Stack 0'
                    }))
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { x: { grid: { display: false } }, y: { grid: { color: '#33333333' } } },
                    plugins: { legend: { display: false } }
                }
            });

            // Doughnut (Distribución Total)
            const totals = {
                'Trabajo': d.timelineData.Trabajo.reduce((a,b)=>a+b,0),
                'Negocios': d.timelineData.Negocios.reduce((a,b)=>a+b,0),
                'Personal': d.timelineData.Personal.reduce((a,b)=>a+b,0)
            };
            
            chartInstances.pie = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(totals),
                    datasets: [{ data: Object.values(totals), backgroundColor: Object.keys(totals).map(k=>COLORS[k]), borderWidth: 0 }]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, cutout: '70%',
                    plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 8 } } }
                }
            });
        }

        function renderTable(d) {
            const tbody = document.getElementById('table-body');
            const sorted = Object.entries(d.projects).sort((a,b) => b[1].focus - a[1].focus);
            
            tbody.innerHTML = sorted.map(([name, val]) => `
                <tr class="hover:bg-gray-50 dark:hover:bg-white/5 transition-colors">
                    <td class="px-4 py-3 font-medium text-gray-900 dark:text-white">${name}</td>
                    <td class="px-4 py-3">
                        <span class="px-2 py-1 rounded text-xs font-bold" style="background:${COLORS[val.cat]}20; color:${COLORS[val.cat]}">${val.cat}</span>
                    </td>
                    <td class="px-4 py-3 font-bold">${val.focus} min</td>
                    <td class="px-4 py-3 text-right">
                        <div class="w-24 h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full ml-auto overflow-hidden">
                            <div class="h-full" style="width:${Math.min((val.focus/(val.focus+val.desc))*100, 100)}%; background:${COLORS[val.cat]}"></div>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        init();
    </script>
</body>
</html>
