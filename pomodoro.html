<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { notion: { bg: '#191919', card: '#202020', text: '#e5e5e5' } } } } }
    </script>
</head>
<body class="bg-transparent text-gray-800 dark:text-gray-200 p-4 font-sans antialiased">

    <div id="loader" class="fixed inset-0 flex items-center justify-center font-bold text-xs uppercase tracking-widest">Conectando bases de datos...</div>

    <div class="max-w-6xl mx-auto space-y-6">
        <!-- HEADER -->
        <div class="flex justify-between items-center border-b border-gray-200 dark:border-gray-800 pb-4">
            <h1 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-600">AUDITORÍA DE TIEMPO REAL</h1>
            <div class="flex bg-gray-100 dark:bg-gray-800 p-1 rounded-lg">
                <button onclick="update('day')" class="p-btn px-3 py-1 text-xs font-bold rounded-md">DÍA</button>
                <button onclick="update('week')" class="p-btn px-3 py-1 text-xs font-bold rounded-md">SEMANA</button>
                <button onclick="update('month')" class="p-btn px-3 py-1 text-xs font-bold rounded-md">MES</button>
            </div>
        </div>

        <!-- KPIs -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="kpi-grid"></div>

        <!-- GRAFICOS -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Stacked Bar (Cronología) -->
            <div class="lg:col-span-2 bg-white dark:bg-notion-card border border-gray-200 dark:border-gray-800 rounded-xl p-4">
                <h3 class="text-xs font-bold text-gray-400 uppercase mb-4">Cronología por Categoría</h3>
                <div class="h-64 relative"><canvas id="mainChart"></canvas></div>
            </div>
            <!-- Pie Chart (Totales) -->
            <div class="bg-white dark:bg-notion-card border border-gray-200 dark:border-gray-800 rounded-xl p-4">
                <h3 class="text-xs font-bold text-gray-400 uppercase mb-4">Distribución</h3>
                <div class="h-64 relative"><canvas id="pieChart"></canvas></div>
            </div>
        </div>

        <!-- TABLA DETALLADA -->
        <div class="bg-white dark:bg-notion-card border border-gray-200 dark:border-gray-800 rounded-xl overflow-hidden">
            <table class="w-full text-sm text-left">
                <thead class="text-xs text-gray-500 uppercase bg-gray-50 dark:bg-gray-800">
                    <tr><th class="px-4 py-3">Proyecto</th><th class="px-4 py-3">Tipo</th><th class="px-4 py-3">Tiempo</th><th class="px-4 py-3 text-right">Barra</th></tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-gray-100 dark:divide-gray-800"></tbody>
            </table>
        </div>
    </div>

    <script>
        let sessions = [], projectsDB = {};
        let charts = {};
        const COLORS = { 'Trabajo': '#3b82f6', 'Personal': '#10b981', 'Negocios': '#f59e0b', 'Otro': '#9ca3af' };

        async function init() {
            try {
                const res = await fetch('datos.json');
                const json = await res.json();
                
                sessions = json.pomodoro || [];
                const rawProjects = json.proyectos || [];

                // CREAR MAPA DE PROYECTOS (ID -> Categoria)
                // Cruzamos los datos: Usamos el ID del proyecto para saber su "Tipo" real
                rawProjects.forEach(p => {
                    const name = p.properties.Nombre?.title[0]?.plain_text || "Sin nombre";
                    const type = p.properties.Tipo?.select?.name || "Otro"; 
                    // Guardamos por ID para búsqueda exacta
                    projectsDB[p.id] = { name, type }; 
                });

                document.getElementById('loader').remove();
                update('week');
            } catch (e) { document.getElementById('loader').innerText = "Error: Falta DB_PROYECTOS en GitHub"; }
        }

        function update(period) {
            document.querySelectorAll('.p-btn').forEach(b => {
                b.className = `p-btn px-3 py-1 text-xs font-bold rounded-md transition-all ${b.innerText.toLowerCase() === period ? 'bg-white dark:bg-gray-700 text-blue-500 shadow' : 'text-gray-500'}`;
            });

            const data = processData(period);
            renderKPIs(data.stats);
            renderCharts(data);
            renderTable(data.projStats, data.stats.total);
        }

        function processData(period) {
            const now = new Date();
            const limit = period === 'day' ? 0 : period === 'week' ? 6 : 29;
            
            let timeline = {};
            let projStats = {};
            let stats = { total: 0, work: 0, pers: 0, biz: 0 };

            // Inicializar timeline
            for(let i=limit; i>=0; i--) {
                const d = new Date(); d.setDate(now.getDate() - i);
                timeline[d.toISOString().split('T')[0]] = { 'Trabajo':0, 'Personal':0, 'Negocios':0, 'Otro':0 };
            }

            sessions.forEach(s => {
                const p = s.properties;
                const dStr = p['Inicio 🍅']?.date?.start || s.created_time;
                const dKey = dStr.split('T')[0];

                if (timeline[dKey]) {
                    // 1. OBTENER TIEMPO
                    const time = p['Enfoque 🍅']?.formula?.number || p['Tiempo']?.number || 0;
                    
                    // 2. OBTENER CATEGORÍA CRUZADA (La magia)
                    // Buscamos la relación en "🔥 PROYECTOS"
                    let cat = 'Otro';
                    let pName = 'Sesión suelta';
                    
                    const relation = p['🔥 PROYECTOS']?.relation;
                    if (relation && relation.length > 0) {
                        const projID = relation[0].id; // Tomamos el ID del proyecto
                        if (projectsDB[projID]) {
                            cat = projectsDB[projID].type; // ¡Aquí sacamos el "Trabajo/Personal" real!
                            pName = projectsDB[projID].name;
                        }
                    }

                    // Sumar datos
                    if (time > 0) {
                        stats.total += time;
                        if (cat.includes('Trabajo')) stats.work += time;
                        else if (cat.includes('Negocio')) stats.biz += time;
                        else if (cat.includes('Personal')) stats.pers += time;

                        // Normalizar keys para el gráfico
                        let key = 'Otro';
                        if (cat.includes('Trabajo')) key = 'Trabajo';
                        if (cat.includes('Negocio')) key = 'Negocios';
                        if (cat.includes('Personal')) key = 'Personal';

                        timeline[dKey][key] += time;

                        if (!projStats[pName]) projStats[pName] = { time: 0, cat: key };
                        projStats[pName].time += time;
                    }
                }
            });

            return { 
                stats, 
                timelineLabels: Object.keys(timeline).map(d => d.slice(5)), 
                timelineData: timeline,
                projStats 
            };
        }

        function renderKPIs(s) {
            const kpi = (l, v, c) => `<div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-3 text-center"><div class="text-xl font-black ${c}">${(v/60).toFixed(1)}h</div><div class="text-[10px] uppercase text-gray-500 font-bold">${l}</div></div>`;
            document.getElementById('kpi-grid').innerHTML = `
                ${kpi('Total', s.total, 'text-gray-800 dark:text-white')}
                ${kpi('Trabajo', s.work, 'text-blue-500')}
                ${kpi('Negocios', s.biz, 'text-orange-500')}
                ${kpi('Personal', s.pers, 'text-green-500')}
            `;
        }

        function renderCharts(d) {
            const ctx1 = document.getElementById('mainChart').getContext('2d');
            const ctx2 = document.getElementById('pieChart').getContext('2d');
            if(charts.a) charts.a.destroy(); if(charts.b) charts.b.destroy();

            // Stacked Bar
            const datasets = Object.keys(COLORS).map(k => ({
                label: k, data: Object.values(d.timelineData).map(v => v[k]), backgroundColor: COLORS[k], borderRadius: 4
            }));

            charts.a = new Chart(ctx1, {
                type: 'bar', data: { labels: d.timelineLabels, datasets },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true, grid: { display: false } }, y: { stacked: true, grid: { color: '#33333333' } } }, plugins: { legend: { display: false } } }
            });

            // Doughnut
            charts.b = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: ['Trabajo', 'Negocios', 'Personal', 'Otro'],
                    datasets: [{ data: [d.stats.work, d.stats.biz, d.stats.pers, d.stats.total - (d.stats.work+d.stats.biz+d.stats.pers)], backgroundColor: Object.values(COLORS), borderWidth: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'right', labels: { usePointStyle: true, boxWidth: 8, font: {size: 10} } } } }
            });
        }

        function renderTable(projs, total) {
            const sorted = Object.entries(projs).sort((a,b) => b[1].time - a[1].time);
            document.getElementById('table-body').innerHTML = sorted.map(([n, v]) => `
                <tr class="hover:bg-gray-100 dark:hover:bg-gray-700/50">
                    <td class="px-4 py-2 font-medium text-gray-800 dark:text-gray-200">${n}</td>
                    <td class="px-4 py-2"><span class="text-[10px] px-2 py-1 rounded font-bold" style="background:${COLORS[v.cat]}22; color:${COLORS[v.cat]}">${v.cat}</span></td>
                    <td class="px-4 py-2 font-bold">${v.time}m</td>
                    <td class="px-4 py-2"><div class="w-20 h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full ml-auto"><div class="h-full rounded-full" style="width:${(v.time/total)*100}%; background:${COLORS[v.cat]}"></div></div></td>
                </tr>
            `).join('');
        }

        init();
    </script>
</body>
</html>
