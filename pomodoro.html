<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Auditoría Real</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --text: #37352f; --text-sec: #6b6b6b;
            --accent: #ef4444; --border: rgba(55, 53, 47, 0.16);
            --card: rgba(255, 255, 255, 0.05);
            /* Colores de Categorías */
            --work: #3b82f6; --biz: #f59e0b; --pers: #10b981; --other: #9ca3af;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --text: #EBEBEB; --text-sec: #9ca3af;
                --accent: #f87171; --border: rgba(255, 255, 255, 0.14);
                --card: rgba(255, 255, 255, 0.03);
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        
        body { background: transparent !important; color: var(--text); padding: 15px; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 10px; }
        h1 { font-size: 1.4rem; font-weight: 900; color: var(--accent); letter-spacing: -0.02em; }
        .selector { display: flex; background: var(--border); padding: 3px; border-radius: 12px; gap: 2px; }
        .btn { border: none; background: transparent; color: var(--text-sec); padding: 8px 16px; border-radius: 9px; cursor: pointer; font-weight: 700; font-size: 0.75rem; transition: 0.3s; }
        .btn.active { background: var(--text); color: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }

        /* Stats */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; text-align: center; }
        .stat-val { font-size: 1.8rem; font-weight: 900; line-height: 1.1; }
        .stat-lab { font-size: 0.65rem; color: var(--text-sec); text-transform: uppercase; font-weight: 800; margin-top: 6px; }

        /* Charts */
        .grid-charts { display: grid; grid-template-columns: 2fr 1.2fr; gap: 20px; margin-bottom: 25px; }
        @media (max-width: 850px) { .grid-charts { grid-template-columns: 1fr; } }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 25px; display: flex; flex-direction: column; }
        .card-title { font-size: 0.8rem; font-weight: 800; margin-bottom: 20px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.05em; }
        .chart-box { position: relative; height: 320px; width: 100%; flex-grow: 1; }

        /* Project Table */
        .project-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 25px; }
        
        #loader { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; font-weight: 900; background: transparent; }
    </style>
</head>
<body>

    <div id="loader">CRUZANDO BASES DE DATOS...</div>

    <div class="container">
        <div class="header">
            <h1>🍅 Auditoría de Tiempo</h1>
            <div class="selector">
                <button class="btn active" onclick="update('day')">HOY</button>
                <button class="btn" onclick="update('week')">SEMANA</button>
                <button class="btn" onclick="update('month')">MES</button>
            </div>
        </div>

        <!-- KPIs por Categoría -->
        <div class="stats" id="kpi-grid"></div>

        <div class="grid-charts">
            <!-- Gráfico 1: Cronología Apilada (Trabajo/Personal/Negocios) -->
            <div class="card">
                <div class="card-title">Cronología de Enfoque</div>
                <div class="chart-box"><canvas id="stackChart"></canvas></div>
            </div>
            <!-- Gráfico 2: Distribución Total -->
            <div class="card">
                <div class="card-title">Distribución por Área</div>
                <div class="chart-box"><canvas id="catChart"></canvas></div>
            </div>
        </div>

        <!-- Gráfico 3: Detalle por Proyecto -->
        <div class="project-card">
            <div class="card-title">Top Proyectos (Minutos)</div>
            <div class="chart-box" style="height: 400px;"><canvas id="projChart"></canvas></div>
        </div>
    </div>

    <script>
        let sessions = [];
        let projectMap = {}; // Aquí guardaremos { ID_PROYECTO: { nombre: "X", tipo: "Trabajo" } }
        let charts = {};
        
        const COLORS = { 'Trabajo': '#3b82f6', 'Negocios': '#f59e0b', 'Personal': '#10b981', 'Otro': '#9ca3af' };

        async function init() {
            try {
                const res = await fetch('datos.json');
                const json = await res.json();
                
                sessions = json.pomodoro || [];
                const projectsDB = json.proyectos || [];

                // 1. CONSTRUIR EL MAPA DE PROYECTOS (La clave del éxito)
                // Convertimos la lista de proyectos en un diccionario rápido de consultar
                projectsDB.forEach(p => {
                    const name = p.properties.Nombre?.title[0]?.plain_text || "Sin nombre";
                    const type = p.properties.Tipo?.select?.name || "Otro";
                    projectMap[p.id] = { name, type };
                });

                document.getElementById('loader').remove();
                update('week');
            } catch (e) { document.getElementById('loader').innerText = "Error cargando datos."; }
        }

        const dropAnim = { duration: 2000, easing: 'easeOutElastic', delay: (c) => c.dataIndex * 100 };

        function update(period) {
            document.querySelectorAll('.btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === (period === 'day' ? 'hoy' : period)));
            
            const processed = processData(period);
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const tCol = isDark ? '#A0A0A0' : '#6b6b6b';

            // Actualizar KPIs
            const kpiHTML = Object.keys(COLORS).map(cat => {
                const val = processed.totals[cat] || 0;
                if (val === 0) return '';
                return `
                <div class="stat-card">
                    <div class="stat-val" style="color: ${COLORS[cat]}">${(val/60).toFixed(1)}h</div>
                    <div class="stat-lab">${cat}</div>
                </div>`;
            }).join('');
            document.getElementById('kpi-grid').innerHTML = kpiHTML || '<div class="stat-card"><div class="stat-val">0h</div><div class="stat-lab">Sin actividad</div></div>';

            // 1. STACKED BAR (Cronología)
            draw('stackChart', 'bar', {
                labels: processed.timelineLabels,
                datasets: Object.keys(COLORS).map(cat => ({
                    label: cat, data: processed.timelineData[cat], backgroundColor: COLORS[cat], borderRadius: 4, stack: 'Stack 0'
                }))
            }, { scales: { x: { stacked: true, grid: { display: false }, ticks: { color: tCol } }, y: { stacked: true, grid: { color: 'rgba(125,125,125,0.1)' }, ticks: { color: tCol } } } });

            // 2. DONA
            draw('catChart', 'doughnut', {
                labels: Object.keys(processed.totals),
                datasets: [{ data: Object.values(processed.totals), backgroundColor: Object.values(COLORS), borderWidth: 0 }]
            }, { plugins: { legend: { position: 'bottom', labels: { color: tCol, usePointStyle: true } } }, cutout: '70%' });

            // 3. PROYECTOS (Barras Horizontales)
            draw('projChart', 'bar', {
                labels: processed.projLabels,
                datasets: [{ label: 'Minutos', data: processed.projValues, backgroundColor: '#f87171', borderRadius: 4 }]
            }, { indexAxis: 'y', scales: { x: { grid: { color: 'rgba(125,125,125,0.1)' }, ticks: { color: tCol } }, y: { ticks: { color: tCol } } }, plugins: { legend: { display: false } } });
        }

        function processData(period) {
            const now = new Date();
            const limit = period === 'day' ? 0 : period === 'week' ? 6 : 29;
            
            let timeline = {};
            let totals = { 'Trabajo': 0, 'Negocios': 0, 'Personal': 0, 'Otro': 0 };
            let projects = {};

            // Inicializar timeline
            for(let i=limit; i>=0; i--) {
                const d = new Date(); d.setDate(now.getDate() - i);
                timeline[d.toISOString().split('T')[0]] = { 'Trabajo':0, 'Negocios':0, 'Personal':0, 'Otro':0 };
            }

            sessions.forEach(s => {
                const p = s.properties;
                const dStr = p['Inicio 🍅']?.date?.start || s.created_time;
                const dKey = dStr.split('T')[0];

                if (timeline[dKey]) {
                    // 1. OBTENER TIEMPO
                    const time = p['Enfoque 🍅']?.formula?.number || p['Tiempo']?.number || 0;
                    
                    // 2. CRUZAR DATOS (LOOKUP)
                    let category = 'Otro';
                    let projectName = 'Sesión sin proyecto';

                    const relations = p['🔥 PROYECTOS']?.relation;
                    
                    if (relations && relations.length > 0) {
                        const projectID = relations[0].id; // ID del proyecto relacionado
                        const projectInfo = projectMap[projectID]; // Buscamos en el mapa que creamos al inicio
                        
                        if (projectInfo) {
                            projectName = projectInfo.name;
                            // Normalizamos la categoría (Notion puede tener mayúsculas/minúsculas)
                            const tipoRaw = projectInfo.type || "Otro";
                            if (tipoRaw.includes("Trabajo")) category = "Trabajo";
                            else if (tipoRaw.includes("Negocio")) category = "Negocios";
                            else if (tipoRaw.includes("Personal")) category = "Personal";
                        }
                    }

                    if (time > 0) {
                        totals[category] += time;
                        timeline[dKey][category] += time;
                        projects[projectName] = (projects[projectName] || 0) + time;
                    }
                }
            });

            // Ordenar proyectos
            const sortedProjs = Object.entries(projects).sort((a,b) => b[1] - a[1]);

            return {
                totals,
                timelineLabels: Object.keys(timeline).map(d => d.slice(5)),
                timelineData: {
                    'Trabajo': Object.values(timeline).map(v => v.Trabajo),
                    'Negocios': Object.values(timeline).map(v => v.Negocios),
                    'Personal': Object.values(timeline).map(v => v.Personal),
                    'Otro': Object.values(timeline).map(v => v.Otro)
                },
                projLabels: sortedProjs.map(p => p[0]),
                projValues: sortedProjs.map(p => p[1])
            };
        }

        function draw(id, type, data, options = {}) {
            const ctx = document.getElementById(id).getContext('2d');
            if (charts[id]) charts[id].destroy();
            charts[id] = new Chart(ctx, {
                type, data, options: {
                    responsive: true, maintainAspectRatio: false, animation: dropAnim,
                    plugins: { legend: { display: false } }, ...options
                }
            });
        }
        init();
    </script>
</body>
</html>
