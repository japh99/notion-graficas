<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Auditoría Pomodoro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #ffffff; --text: #2c2c2c; --text-sec: #6b6b6b;
            --accent: #ef4444; --border: #e0e0e0; --card: #ffffff;
            --work: #3b82f6; --personal: #10b981; --biz: #f59e0b;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0d0d0f; --text: #f3f4f6; --text-sec: #9ca3af;
                --accent: #f87171; --border: #262626; --card: #16161a;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        h1 { font-size: 1.4rem; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 0.05em; }
        .update-tag { font-size: 0.7rem; background: var(--border); padding: 4px 10px; border-radius: 20px; color: var(--text-sec); }

        /* KPI Grid */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; text-align: center; }
        .stat-val { font-size: 1.8rem; font-weight: 800; color: var(--accent); }
        .stat-lab { font-size: 0.65rem; color: var(--text-sec); text-transform: uppercase; font-weight: 700; margin-top: 5px; }

        /* Charts Layout */
        .grid-charts { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; margin-bottom: 30px; }
        @media (max-width: 800px) { .grid-charts { grid-template-columns: 1fr; } }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; }
        .card-title { font-size: 0.8rem; font-weight: 800; margin-bottom: 20px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.05em; border-left: 3px solid var(--accent); padding-left: 10px; }
        .chart-box { position: relative; height: 300px; width: 100%; }

        /* Detail List */
        .list-container { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; }
        .project-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .project-item:last-child { border-bottom: none; }
        
        .p-info { display: flex; flex-direction: column; gap: 4px; }
        .p-name { font-weight: 700; font-size: 0.9rem; }
        .p-tag { font-size: 0.65rem; padding: 2px 8px; border-radius: 6px; width: fit-content; font-weight: 600; }
        .tag-trabajo { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .tag-personal { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .tag-negocios { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .tag-otro { background: var(--border); color: var(--text-sec); }

        .p-stats { text-align: right; font-size: 0.8rem; }
        .p-focus { color: var(--accent); font-weight: 700; }
        .p-break { color: var(--text-sec); font-size: 0.7rem; }
        .efficiency-bar { width: 100px; height: 6px; background: var(--border); border-radius: 3px; margin-top: 5px; overflow: hidden; margin-left: auto; }
        .efficiency-fill { height: 100%; background: var(--accent); }

        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 100; font-weight: 800; }
    </style>
</head>
<body>

    <div id="loader">Auditando Proyectos...</div>

    <div class="container">
        <div class="header">
            <h1>🍅 Auditoría de Tiempo</h1>
            <span class="update-tag" id="lastUpdate">Sincronizando...</span>
        </div>

        <!-- KPIs Generales -->
        <div class="stats" id="statsGrid"></div>

        <!-- Gráficos: Categorías y Proyectos -->
        <div class="grid-charts">
            <div class="card">
                <div class="card-title">Distribución por Área</div>
                <div class="chart-box"><canvas id="catChart"></canvas></div>
            </div>
            <div class="card">
                <div class="card-title">Eficiencia por Proyecto (Enfoque vs Descanso)</div>
                <div class="chart-box"><canvas id="projectChart"></canvas></div>
            </div>
        </div>

        <!-- Lista Detallada -->
        <div class="list-container">
            <div class="card-title">Desglose Detallado de Actividad</div>
            <div id="projectList"></div>
        </div>
    </div>

    <script>
        async function init() {
            try {
                const res = await fetch('datos.json');
                const json = await res.json();
                const rawData = json.pomodoro || json.datos?.pomodoro || [];
                
                document.getElementById('lastUpdate').innerText = json.metadata?.actualizacion || 'Hoy';
                document.getElementById('loader').remove();
                
                processAndRender(rawData);
            } catch (e) {
                document.getElementById('loader').innerText = "❌ Error en datos.json";
            }
        }

        function processAndRender(data) {
            let totalFocus = 0;
            let totalBreak = 0;
            let categories = {};
            let projects = [];

            data.forEach(item => {
                const p = item.properties;
                const name = p.Name?.title[0]?.plain_text || "Sin Nombre";
                
                // Extraer Categoría (Trabajo, Personal, Negocios)
                const cat = p.Tipo?.select?.name || "Otro";
                
                // Extraer Tiempos (Soporte para múltiples nombres de columna)
                const focus = p['Enfoque 🍅']?.number || p['Enfoque total']?.number || p['Tiempo']?.number || 0;
                const rest = p['Descanso']?.number || p['Descanso total']?.number || 0;

                if (focus > 0 || rest > 0) {
                    totalFocus += focus;
                    totalBreak += rest;

                    // Agrupar por Categoría
                    categories[cat] = (categories[cat] || 0) + focus;

                    // Guardar Proyecto
                    projects.push({ name, cat, focus, rest, total: focus + rest });
                }
            });

            // Ordenar proyectos por tiempo total
            projects.sort((a, b) => b.focus - a.focus);

            renderStats(totalFocus, totalBreak, projects.length);
            renderCategoryChart(categories);
            renderProjectChart(projects.slice(0, 10)); // Top 10 proyectos
            renderList(projects);
        }

        function renderStats(f, b, count) {
            const efficiency = Math.round((f / (f + b)) * 100) || 0;
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-val">${(f/60).toFixed(1)}h</div>
                    <div class="stat-lab">Total Enfoque</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val">${(b/60).toFixed(1)}h</div>
                    <div class="stat-lab">Total Descanso</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" style="color:${efficiency > 80 ? '#10b981' : '#f59e0b'}">${efficiency}%</div>
                    <div class="stat-lab">Eficiencia Global</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" style="color:var(--text)">${count}</div>
                    <div class="stat-lab">Proyectos Activos</div>
                </div>
            `;
        }

        function renderCategoryChart(cats) {
            const ctx = document.getElementById('catChart').getContext('2d');
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            // Colores específicos para tus etiquetas
            const colorMap = {
                'Trabajo': '#3b82f6', 'Personal': '#10b981', 'Negocios': '#f59e0b'
            };
            const bgColors = Object.keys(cats).map(k => colorMap[k] || '#9ca3af');

            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(cats),
                    datasets: [{
                        data: Object.values(cats),
                        backgroundColor: bgColors,
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { position: 'bottom', labels: { color: isDark ? '#fff' : '#333', usePointStyle: true, padding: 20 } } 
                    }
                }
            });
        }

        function renderProjectChart(projects) {
            const ctx = document.getElementById('projectChart').getContext('2d');
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const tCol = isDark ? '#a0a0a0' : '#666';

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: projects.map(p => p.name.length > 15 ? p.name.slice(0,15)+'...' : p.name),
                    datasets: [
                        { label: 'Enfoque', data: projects.map(p => p.focus), backgroundColor: '#ef4444', borderRadius: 4 },
                        { label: 'Descanso', data: projects.map(p => p.rest), backgroundColor: '#10b981', borderRadius: 4 }
                    ]
                },
                options: {
                    indexAxis: 'y', // Barras horizontales
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: true, labels: { color: tCol } } },
                    scales: {
                        x: { stacked: true, grid: { color: 'rgba(125,125,125,0.1)' }, ticks: { color: tCol } },
                        y: { stacked: true, grid: { display: false }, ticks: { color: tCol } }
                    }
                }
            });
        }

        function renderList(projects) {
            const container = document.getElementById('projectList');
            container.innerHTML = projects.map(p => {
                const eff = Math.round((p.focus / p.total) * 100) || 0;
                const tagClass = 'tag-' + (p.cat.toLowerCase().includes('trabajo') ? 'trabajo' : 
                                         p.cat.toLowerCase().includes('personal') ? 'personal' : 
                                         p.cat.toLowerCase().includes('negocio') ? 'negocios' : 'otro');
                
                return `
                <div class="project-item">
                    <div class="p-info">
                        <div class="p-name">${p.name}</div>
                        <div class="p-tag ${tagClass}">${p.cat}</div>
                    </div>
                    <div class="p-stats">
                        <div class="p-focus">${p.focus} min <span style="font-weight:400; color:var(--text-sec)">/ ${p.rest} min desc.</span></div>
                        <div class="efficiency-bar">
                            <div class="efficiency-fill" style="width: ${eff}%"></div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        init();
    </script>
</body>
</html>
