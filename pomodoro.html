<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Auditoría Inteligente</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --text: #37352f; --text-sec: #6b6b6b;
            --accent: #ef4444; --border: rgba(55, 53, 47, 0.16);
            --card: rgba(255, 255, 255, 0.05);
            --work: #3b82f6; --biz: #f59e0b; --pers: #10b981; --other: #9ca3af;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --text: #EBEBEB; --text-sec: #9ca3af;
                --accent: #f87171; --border: rgba(255, 255, 255, 0.14);
                --card: rgba(255, 255, 255, 0.03);
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        
        body { background: transparent !important; color: var(--text); padding: 15px; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 10px; }
        h1 { font-size: 1.4rem; font-weight: 900; color: var(--accent); letter-spacing: -0.02em; }
        .selector { display: flex; background: var(--border); padding: 3px; border-radius: 12px; gap: 2px; }
        .btn { border: none; background: transparent; color: var(--text-sec); padding: 8px 16px; border-radius: 9px; cursor: pointer; font-weight: 700; font-size: 0.75rem; transition: 0.3s; }
        .btn.active { background: var(--text); color: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }

        /* KPI Grid */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; text-align: center; }
        .stat-val { font-size: 1.8rem; font-weight: 900; color: var(--accent); line-height: 1.1; }
        .stat-lab { font-size: 0.65rem; color: var(--text-sec); text-transform: uppercase; font-weight: 800; margin-top: 6px; }

        /* Main Charts */
        .grid-charts { display: grid; grid-template-columns: 2fr 1.2fr; gap: 20px; margin-bottom: 25px; }
        @media (max-width: 850px) { .grid-charts { grid-template-columns: 1fr; } }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 25px; display: flex; flex-direction: column; }
        .card-title { font-size: 0.8rem; font-weight: 800; margin-bottom: 20px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.05em; }
        .chart-box { position: relative; height: 320px; width: 100%; flex-grow: 1; }

        /* Bottom Row: Project Details */
        .project-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 25px; }

        #loader { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; font-weight: 900; background: transparent; }
    </style>
</head>
<body>

    <div id="loader">ANALIZANDO...</div>

    <div class="container">
        <div class="header">
            <h1>JAPH Pomodoro Intelligence</h1>
            <div class="selector">
                <button class="btn active" onclick="update('day')">HOY</button>
                <button class="btn" onclick="update('week')">SEMANA</button>
                <button class="btn" onclick="update('month')">MES</button>
            </div>
        </div>

        <!-- KPIs Dinámicos -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-val" id="kFocus">0h</div>
                <div class="stat-lab">Total Enfoque</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="kBreak" style="color: #10b981;">0h</div>
                <div class="stat-lab">Total Descanso</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="kBestCat" style="color: var(--text);">---</div>
                <div class="stat-lab">Categoría Líder</div>
            </div>
        </div>

        <div class="grid-charts">
            <!-- Gráfico 1: Cronología Apilada por Categoría -->
            <div class="card">
                <div class="card-title">Composición del Tiempo (Categorías)</div>
                <div class="chart-box"><canvas id="stackChart"></canvas></div>
            </div>
            <!-- Gráfico 2: Distribución por Categoría -->
            <div class="card">
                <div class="card-title">Distribución Total</div>
                <div class="chart-box"><canvas id="catChart"></canvas></div>
            </div>
        </div>

        <!-- Gráfico 3: Tiempo por Proyecto Individual -->
        <div class="project-card">
            <div class="card-title">Minutos por Proyecto / Tarea</div>
            <div class="chart-box" style="height: 400px;"><canvas id="projChart"></canvas></div>
        </div>
    </div>

    <script>
        let rawData = [];
        let charts = {};
        const COLORS = { 'Trabajo': '#3b82f6', 'Negocios': '#f59e0b', 'Personal': '#10b981', 'Otro': '#9ca3af' };

        async function init() {
            try {
                const res = await fetch('datos.json');
                const json = await res.json();
                rawData = json.pomodoro || [];
                document.getElementById('loader').remove();
                update('week');
            } catch (e) { document.getElementById('loader').innerText = "Error: Datos no encontrados."; }
        }

        const dropAnim = { duration: 2000, easing: 'easeOutElastic', delay: (c) => c.dataIndex * 120 };

        function update(period) {
            document.querySelectorAll('.btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === (period === 'day' ? 'hoy' : period)));
            
            const processed = processData(period);
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const tCol = isDark ? '#A0A0A0' : '#6b6b6b';

            // Actualizar KPIs
            document.getElementById('kFocus').innerText = (processed.sumF / 60).toFixed(1) + 'h';
            document.getElementById('kBreak').innerText = (processed.sumB / 60).toFixed(1) + 'h';
            document.getElementById('kBestCat').innerText = processed.bestCat;

            // 1. STACKED BAR (Timeline)
            draw('stackChart', 'bar', {
                labels: processed.timelineLabels,
                datasets: Object.keys(COLORS).map(cat => ({
                    label: cat, data: processed.timelineData[cat], backgroundColor: COLORS[cat], borderRadius: 5
                }))
            }, { scales: { x: { stacked: true, grid: { display: false }, ticks: { color: tCol } }, y: { stacked: true, grid: { color: 'rgba(125,125,125,0.1)' }, ticks: { color: tCol } } } });

            // 2. DONA (Categorías)
            draw('catChart', 'doughnut', {
                labels: Object.keys(processed.catTotals),
                datasets: [{ data: Object.values(processed.catTotals), backgroundColor: Object.keys(processed.catTotals).map(k => COLORS[k]), borderWidth: 0, cutout: '75%' }]
            }, { plugins: { legend: { position: 'bottom', labels: { color: tCol, usePointStyle: true, font: { size: 10 } } } } });

            // 3. HORIZONTAL BARS (Proyectos)
            draw('projChart', 'bar', {
                labels: processed.projLabels,
                datasets: [{ label: 'Minutos de Enfoque', data: processed.projValues, backgroundColor: '#f87171', borderRadius: 4 }]
            }, { indexAxis: 'y', scales: { x: { grid: { color: 'rgba(125,125,125,0.1)' }, ticks: { color: tCol } }, y: { ticks: { color: tCol, font: { size: 10 } } } } });
        }

        function processData(period) {
            const now = new Date();
            let sumF = 0, sumB = 0;
            let catTotals = { 'Trabajo': 0, 'Negocios': 0, 'Personal': 0, 'Otro': 0 };
            let projMap = {};
            let timeline = {};

            const range = period === 'day' ? 0 : period === 'week' ? 6 : 29;
            for(let i=range; i>=0; i--) {
                const d = new Date(); d.setDate(now.getDate() - i);
                const k = d.toISOString().split('T')[0];
                timeline[k] = { 'Trabajo': 0, 'Negocios': 0, 'Personal': 0, 'Otro': 0 };
            }

            rawData.forEach(item => {
                const p = item.properties;
                const dStr = p['Inicio 🍅']?.date?.start || item.created_time;
                const dKey = dStr.split('T')[0];

                if (timeline[dKey] !== undefined) {
                    const f = p['Enfoque 🍅']?.formula?.number || p['Tiempo']?.number || 0;
                    const b = p['Descansos ☕️']?.formula?.number || 0;
                    const type = (p['Tipo']?.select?.name || "").toLowerCase();
                    const name = p.Name?.title[0]?.plain_text || "General";

                    // Identificación Inteligente
                    let cat = 'Otro';
                    if (type.includes('trabajo') || name.toLowerCase().includes('trabajo')) cat = 'Trabajo';
                    else if (type.includes('negocio') || name.toLowerCase().includes('negocio')) cat = 'Negocios';
                    else if (type.includes('personal') || type.includes('leer') || name.toLowerCase().includes('personal')) cat = 'Personal';

                    sumF += f; sumB += b;
                    catTotals[cat] += f;
                    timeline[dKey][cat] += f;
                    if (f > 0) projMap[name] = (projMap[name] || 0) + f;
                }
            });

            const bestCat = Object.keys(catTotals).reduce((a, b) => catTotals[a] > catTotals[b] ? a : b);
            const sortedProjs = Object.entries(projMap).sort((a,b) => b[1] - a[1]);

            return {
                sumF, sumB, bestCat, catTotals,
                timelineLabels: Object.keys(timeline).map(k => k.slice(5)),
                timelineData: {
                    'Trabajo': Object.values(timeline).map(d => d['Trabajo']),
                    'Negocios': Object.values(timeline).map(d => d['Negocios']),
                    'Personal': Object.values(timeline).map(d => d['Personal']),
                    'Otro': Object.values(timeline).map(d => d['Otro'])
                },
                projLabels: sortedProjs.map(p => p[0]),
                projValues: sortedProjs.map(p => p[1])
            };
        }

        function draw(id, type, data, options = {}) {
            const ctx = document.getElementById(id).getContext('2d');
            if (charts[id]) charts[id].destroy();
            charts[id] = new Chart(ctx, {
                type, data, options: {
                    responsive: true, maintainAspectRatio: false, animation: dropAnim,
                    plugins: { legend: { display: false } }, ...options
                }
            });
        }
        init();
    </script>
</body>
</html>
