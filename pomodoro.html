<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Auditoría Total</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #ffffff; --text: #2c2c2c; --text-sec: #6b6b6b;
            --card: #ffffff; --border: #e0e0e0;
            --work: #3b82f6; --pers: #10b981; --biz: #f59e0b; --other: #9ca3af;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f0f0f; --text: #f3f4f6; --text-sec: #9ca3af;
                --card: #16161a; --border: #262626;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }

        /* HEADER & CONTROLS */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 10px; }
        h1 { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.02em; }
        .period-selector { display: flex; background: var(--border); padding: 4px; border-radius: 12px; gap: 4px; }
        .btn { border: none; background: transparent; color: var(--text-sec); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.75rem; transition: 0.3s; }
        .btn.active { background: var(--card); color: var(--text); box-shadow: 0 2px 6px rgba(0,0,0,0.15); }

        /* KPI STATS */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; border-left: 4px solid var(--bd-color, #ccc); }
        .stat-val { font-size: 1.6rem; font-weight: 800; }
        .stat-lab { font-size: 0.7rem; color: var(--text-sec); text-transform: uppercase; font-weight: 700; }

        /* CHARTS LAYOUT */
        .grid-charts { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; }
        @media (max-width: 800px) { .grid-charts { grid-template-columns: 1fr; } }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 20px; display: flex; flex-direction: column; }
        .card-head { font-size: 0.8rem; font-weight: 800; margin-bottom: 20px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.05em; }
        .chart-box { position: relative; height: 320px; width: 100%; flex-grow: 1; }

        /* TABLE */
        .table-container { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; color: var(--text-sec); padding: 12px; border-bottom: 2px solid var(--border); font-size: 0.7rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        .tag { padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 0.7rem; display: inline-block; }
        
        /* Loading */
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 100; font-weight: 800; }
    </style>
</head>
<body>

    <div id="loader">Clasificando Datos...</div>

    <div class="container">
        <div class="header">
            <h1>🍅 Auditoría de Tiempo</h1>
            <div class="period-selector">
                <button class="btn active" onclick="updateView('day')">HOY</button>
                <button class="btn" onclick="updateView('week')">SEMANA</button>
                <button class="btn" onclick="updateView('month')">MES</button>
            </div>
        </div>

        <!-- KPIs por Categoría -->
        <div class="stats-grid" id="kpiContainer"></div>

        <div class="grid-charts">
            <!-- Gráfico Principal: Stacked Bar -->
            <div class="card">
                <div class="card-head" id="mainChartTitle">Cronología Apilada</div>
                <div class="chart-box"><canvas id="mainChart"></canvas></div>
            </div>
            <!-- Gráfico Secundario: Distribución Total -->
            <div class="card">
                <div class="card-head">Distribución del Periodo</div>
                <div class="chart-box"><canvas id="pieChart"></canvas></div>
            </div>
        </div>

        <!-- Tabla Detallada -->
        <div class="table-container">
            <div class="card-head">Desglose de Proyectos</div>
            <table id="dataTable">
                <thead><tr><th>Proyecto</th><th>Categoría</th><th>Minutos</th><th>% Total</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let rawData = [];
        let chartInstances = {};

        // Configuración de Colores
        const CAT_COLORS = {
            'Trabajo': '#3b82f6',   // Azul
            'Personal': '#10b981',  // Verde
            'Negocios': '#f59e0b',  // Naranja
            'Otro': '#9ca3af'       // Gris
        };

        async function init() {
            try {
                const res = await fetch('datos.json');
                const json = await res.json();
                rawData = json.pomodoro || json.datos?.pomodoro || [];
                document.getElementById('loader').remove();
                updateView('week');
            } catch (e) {
                document.getElementById('loader').innerText = "❌ Error: Verifica datos.json";
            }
        }

        // Animación DROP (Caída elástica)
        const dropAnim = {
            y: {
                from: 500,
                duration: 1000,
                easing: 'easeOutBounce'
            }
        };

        function updateView(period) {
            document.querySelectorAll('.btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === (period === 'day' ? 'hoy' : period)));
            
            const data = processData(period);
            renderKPIs(data.totals);
            renderCharts(data, period);
            renderTable(data.projects, data.grandTotal);
        }

        function processData(period) {
            const now = new Date();
            const daysMap = {}; // Para el gráfico de barras X=Fecha
            const totals = { 'Trabajo': 0, 'Personal': 0, 'Negocios': 0, 'Otro': 0 };
            const projects = {}; // Para la tabla
            let grandTotal = 0;

            // Configurar rango de fechas
            let limit = 0;
            if (period === 'day') limit = 0; 
            else if (period === 'week') limit = 6;
            else limit = 29;

            // Inicializar días en el eje X
            for(let i=limit; i>=0; i--) {
                const d = new Date(); d.setDate(now.getDate() - i);
                const k = d.toISOString().split('T')[0];
                daysMap[k] = { 'Trabajo': 0, 'Personal': 0, 'Negocios': 0, 'Otro': 0 };
            }

            rawData.forEach(item => {
                const p = item.properties;
                // 1. Obtener Fecha
                const dateStr = p['Inicio 🍅']?.date?.start || item.created_time;
                const dateKey = dateStr.split('T')[0];

                if (daysMap[dateKey]) { // Solo si está en el rango
                    // 2. Obtener Tiempo
                    const time = p['Tiempo']?.number || p['Enfoque 🍅']?.number || 0;
                    
                    // 3. DETECCIÓN INTELIGENTE DE CATEGORÍA
                    // Prioridad 1: Columna 'Tipo' explícita
                    let rawType = (p['Tipo']?.select?.name || "").toLowerCase();
                    let projName = p.Name?.title[0]?.plain_text || "Sin Nombre";
                    let category = 'Otro';

                    // Lógica de clasificación
                    if (rawType.includes('trabajo') || projName.toLowerCase().includes('trabajo')) category = 'Trabajo';
                    else if (rawType.includes('personal') || projName.toLowerCase().includes('personal') || rawType.includes('leer')) category = 'Personal';
                    else if (rawType.includes('negocio') || projName.toLowerCase().includes('negocio')) category = 'Negocios';
                    
                    // Si es tiempo productivo (>0)
                    if (time > 0) {
                        // Sumar a Totales
                        totals[category] += time;
                        grandTotal += time;
                        
                        // Sumar al Gráfico Stacked
                        daysMap[dateKey][category] += time;

                        // Sumar a Tabla de Proyectos
                        if (!projects[projName]) projects[projName] = { cat: category, time: 0 };
                        projects[projName].time += time;
                    }
                }
            });

            return { 
                daysLabels: Object.keys(daysMap).map(d => d.slice(5)), // MM-DD
                daysData: Object.values(daysMap),
                totals,
                projects,
                grandTotal
            };
        }

        function renderKPIs(totals) {
            const container = document.getElementById('kpiContainer');
            container.innerHTML = Object.entries(totals).map(([cat, val]) => {
                const hours = (val / 60).toFixed(1);
                if (val === 0) return ''; // Ocultar vacíos
                return `
                <div class="stat-card" style="--bd-color: ${CAT_COLORS[cat]}">
                    <div class="stat-val" style="color: ${CAT_COLORS[cat]}">${hours}h</div>
                    <div class="stat-lab">${cat}</div>
                </div>`;
            }).join('');
        }

        function renderCharts(d, period) {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const tCol = isDark ? '#a0a0a0' : '#666';

            // 1. STACKED BAR CHART
            const ctx1 = document.getElementById('mainChart').getContext('2d');
            if (chartInstances.main) chartInstances.main.destroy();

            const datasets = Object.keys(CAT_COLORS).map(cat => ({
                label: cat,
                data: d.daysData.map(day => day[cat]),
                backgroundColor: CAT_COLORS[cat],
                borderRadius: 4
            }));

            chartInstances.main = new Chart(ctx1, {
                type: 'bar',
                data: { labels: d.daysLabels, datasets: datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    animation: dropAnim, // EFECTO DROP
                    scales: {
                        x: { stacked: true, grid: { display: false }, ticks: { color: tCol } },
                        y: { stacked: true, grid: { color: 'rgba(125,125,125,0.1)' }, ticks: { color: tCol } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
            document.getElementById('mainChartTitle').innerText = period === 'day' ? "Actividad por Hora" : "Cronología Apilada";

            // 2. PIE CHART
            const ctx2 = document.getElementById('pieChart').getContext('2d');
            if (chartInstances.pie) chartInstances.pie.destroy();

            chartInstances.pie = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(d.totals),
                    datasets: [{
                        data: Object.values(d.totals),
                        backgroundColor: Object.keys(d.totals).map(k => CAT_COLORS[k]),
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    animation: { animateScale: true, animateRotate: true },
                    plugins: { legend: { position: 'right', labels: { color: tCol, usePointStyle: true, boxWidth: 8 } } }
                }
            });
        }

        function renderTable(projects, total) {
            const tbody = document.getElementById('tableBody');
            const sorted = Object.entries(projects).sort((a,b) => b[1].time - a[1].time);
            
            tbody.innerHTML = sorted.map(([name, data]) => {
                const percent = total > 0 ? Math.round((data.time / total) * 100) : 0;
                const color = CAT_COLORS[data.cat];
                return `
                <tr>
                    <td style="font-weight:600">${name}</td>
                    <td><span class="tag" style="background:${color}22; color:${color}">${data.cat}</span></td>
                    <td style="font-weight:bold">${data.time} min</td>
                    <td>
                        <div style="width:100%; background:var(--border); height:6px; border-radius:3px; overflow:hidden;">
                            <div style="width:${percent}%; background:${color}; height:100%"></div>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        init();
    </script>
</body>
</html>
