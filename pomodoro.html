<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Auditoría de Tiempo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #ffffff; --text: #2c2c2c; --text-sec: #6b6b6b;
            --card: #ffffff; --border: #e0e0e0;
            --c1: #ef4444; --c2: #3b82f6; --c3: #10b981; --c4: #f59e0b; --c5: #8b5cf6;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f0f0f; --text: #f3f4f6; --text-sec: #9ca3af;
                --card: #16161a; --border: #262626;
                --c1: #f87171; --c2: #60a5fa; --c3: #34d399; --c4: #fbbf24; --c5: #a78bfa;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 15px; }
        .container { max-width: 1100px; margin: 0 auto; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        h1 { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.02em; }
        .selector { display: flex; background: var(--border); padding: 3px; border-radius: 12px; gap: 2px; }
        .btn { border: none; background: transparent; color: var(--text-sec); padding: 8px 16px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 0.75rem; transition: 0.3s; }
        .btn.active { background: var(--card); color: var(--c1); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* Stats */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; position: relative; overflow: hidden; }
        .stat-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--c1); }
        .stat-val { font-size: 1.8rem; font-weight: 900; }
        .stat-lab { font-size: 0.7rem; color: var(--text-sec); text-transform: uppercase; margin-top: 5px; font-weight: 700; }

        /* Charts */
        .charts-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; margin-bottom: 25px; }
        @media (max-width: 800px) { .charts-grid { grid-template-columns: 1fr; } }
        
        .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 20px; display: flex; flex-direction: column; }
        .chart-head { font-size: 0.8rem; font-weight: 800; margin-bottom: 15px; color: var(--text-sec); text-transform: uppercase; }
        .chart-wrapper { position: relative; height: 300px; width: 100%; flex-grow: 1; }

        /* Table */
        .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; }
        .log-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .log-table th { text-align: left; color: var(--text-sec); padding: 10px; border-bottom: 1px solid var(--border); font-size: 0.7rem; text-transform: uppercase; }
        .log-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); }
        .log-table tr:last-child td { border-bottom: none; }
        
        .tag { padding: 3px 8px; border-radius: 6px; font-weight: 700; font-size: 0.7rem; white-space: nowrap; }
        .tag-work { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .tag-personal { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .tag-biz { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .tag-focus { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 100; font-weight: 800; }
    </style>
</head>
<body>

    <div id="loader">Auditando Tiempo...</div>

    <div class="container">
        <div class="header">
            <h1>🍅 Auditoría de Proyectos</h1>
            <div class="selector">
                <button class="btn active" onclick="update('day')">HOY</button>
                <button class="btn" onclick="update('week')">SEMANA</button>
                <button class="btn" onclick="update('month')">MES</button>
            </div>
        </div>

        <div class="stats" id="statsGrid"></div>

        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-head" id="distTitle">Distribución por Proyecto</div>
                <div class="chart-wrapper"><canvas id="pieChart"></canvas></div>
            </div>
            <div class="chart-card">
                <div class="chart-head" id="timelineTitle">Cronología de Enfoque</div>
                <div class="chart-wrapper"><canvas id="barChart"></canvas></div>
            </div>
        </div>

        <div class="table-card">
            <div class="chart-head">Detalle de Sesiones</div>
            <table class="log-table">
                <thead><tr><th>Proyecto / Actividad</th><th>Categoría</th><th>Tiempo</th><th>Fecha</th></tr></thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let rawData = [];
        let chartInstances = {};

        async function init() {
            try {
                const res = await fetch('datos.json');
                const json = await res.json();
                rawData = json.pomodoro || json.datos?.pomodoro || [];
                document.getElementById('loader').remove();
                update('week');
            } catch (e) { document.getElementById('loader').innerText = "❌ Error en datos"; }
        }

        function update(period) {
            document.querySelectorAll('.btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === period));
            const data = processData(period);
            renderStats(data);
            renderCharts(data, period);
            renderTable(data.logs);
        }

        function processData(period) {
            const now = new Date();
            let totalMins = 0, sessions = 0;
            let projects = {};
            let timeline = {}; 
            let logs = [];

            // Definir rango
            const range = period === 'day' ? 0 : period === 'week' ? 6 : 29;
            
            // Inicializar timeline vacío
            for(let i=range; i>=0; i--) {
                const d = new Date(); d.setDate(now.getDate() - i);
                const k = d.toISOString().split('T')[0];
                timeline[k] = {}; // Objeto para guardar {ProyectoA: 10, ProyectoB: 20}
            }

            rawData.forEach(item => {
                const p = item.properties;
                const dStr = p['Inicio 🍅']?.date?.start || item.created_time;
                const dDate = new Date(dStr);
                
                // Filtro fecha
                const diff = Math.floor((now - dDate) / (1000*60*60*24));
                if (diff > range || diff < 0) return;

                const time = p['Tiempo']?.number || 0;
                const type = p['Tipo']?.select?.name || "";
                
                // IMPORTANTE: Detectar Nombre del Proyecto
                // Como es una relación, intentamos sacar el texto o usar "Sesión General"
                // Si tienes un Rollup con la categoría, úsalo aquí.
                // Simulamos categorías por nombre si no existe el dato directo
                let projName = "General";
                if (p['🔥 PROYECTOS']?.relation?.length > 0) {
                    // Nota: La API a veces no da el nombre de la relación directamente sin otro query.
                    // Usaremos el título de la sesión si la relación es solo ID.
                    projName = p.Name?.title[0]?.plain_text || "Proyecto X";
                } else {
                    projName = p.Name?.title[0]?.plain_text || "Sin Asignar";
                }

                // Inferencia de Categoría (Basado en palabras clave)
                let cat = "Otro";
                const text = (projName + type).toLowerCase();
                if (text.includes('trabajo') || text.includes('work')) cat = "Trabajo";
                else if (text.includes('personal') || text.includes('leer') || text.includes('medit')) cat = "Personal";
                else if (text.includes('negocio') || text.includes('biz')) cat = "Negocios";

                if (type.includes("Enfoque")) {
                    totalMins += time;
                    sessions++;
                    
                    // Agrupar por Proyecto
                    if (!projects[projName]) projects[projName] = { time: 0, cat: cat };
                    projects[projName].time += time;

                    // Agrupar en Timeline (Stacked)
                    const k = dDate.toISOString().split('T')[0];
                    if (timeline[k]) {
                        timeline[k][projName] = (timeline[k][projName] || 0) + time;
                    }

                    logs.push({ name: projName, cat, time, date: dDate });
                }
            });

            return { totalMins, sessions, projects, timeline, logs: logs.sort((a,b)=>b.date-a.date) };
        }

        function renderStats(d) {
            // Encontrar Top Proyecto
            let topProj = "N/A", maxT = 0;
            Object.entries(d.projects).forEach(([k,v]) => { if(v.time > maxT){ maxT=v.time; topProj=k; }});

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card" style="--c1:var(--c1)">
                    <div class="stat-val">${(d.totalMins/60).toFixed(1)}h</div>
                    <div class="stat-lab">Total Horas</div>
                </div>
                <div class="stat-card" style="--c1:var(--c2)">
                    <div class="stat-val">${Object.keys(d.projects).length}</div>
                    <div class="stat-lab">Proyectos Activos</div>
                </div>
                <div class="stat-card" style="--c1:var(--c3)">
                    <div class="stat-val" style="font-size:1.2rem; line-height:1.5">${topProj}</div>
                    <div class="stat-lab">Mayor Enfoque</div>
                </div>
            `;
        }

        function renderCharts(d, period) {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const tCol = isDark ? '#a0a0a0' : '#666';
            const colors = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];

            // 1. DOUGHNUT (Distribución de Proyectos)
            const ctx1 = document.getElementById('pieChart').getContext('2d');
            if (chartInstances.pie) chartInstances.pie.destroy();
            
            const projNames = Object.keys(d.projects);
            const projTimes = Object.values(d.projects).map(v => v.time);

            chartInstances.pie = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: projNames,
                    datasets: [{ data: projTimes, backgroundColor: colors, borderWidth: 0 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'right', labels: { color: tCol, boxWidth: 12, font: {size:10} } } }
                }
            });

            // 2. STACKED BAR (Cronología Apilada)
            const ctx2 = document.getElementById('barChart').getContext('2d');
            if (chartInstances.bar) chartInstances.bar.destroy();

            const dates = Object.keys(d.timeline).sort();
            const datasets = projNames.map((name, i) => ({
                label: name,
                data: dates.map(date => d.timeline[date][name] || 0),
                backgroundColor: colors[i % colors.length],
                borderRadius: 4
            }));

            chartInstances.bar = new Chart(ctx2, {
                type: 'bar',
                data: { labels: dates.map(date => date.slice(5)), datasets: datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { stacked: true, grid: { display: false }, ticks: { color: tCol } },
                        y: { stacked: true, grid: { color: 'rgba(125,125,125,0.1)' }, ticks: { color: tCol } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function renderTable(logs) {
            const body = document.getElementById('logBody');
            body.innerHTML = logs.slice(0, 8).map(l => {
                let tagClass = 'tag-focus';
                if(l.cat === 'Trabajo') tagClass = 'tag-work';
                if(l.cat === 'Personal') tagClass = 'tag-personal';
                if(l.cat === 'Negocios') tagClass = 'tag-biz';

                return `
                <tr>
                    <td style="font-weight:600">${l.name}</td>
                    <td><span class="tag ${tagClass}">${l.cat}</span></td>
                    <td style="color:var(--c1); font-weight:bold">${l.time} min</td>
                    <td style="color:var(--text-sec)">${l.date.toLocaleDateString()}</td>
                </tr>`;
            }).join('');
        }

        init();
    </script>
</body>
</html>
