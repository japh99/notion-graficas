<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría Real JAPH</title>
    
    <!-- Librerías -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        notion: { text: '#e5e5e5', border: '#2f2f2f' }
                    }
                }
            }
        }
    </script>
    <style>
        /* FONDO TRANSPARENTE OBLIGATORIO */
        body, html { background-color: transparent !important; }
        
        /* Scrollbar estilo Notion */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.5); border-radius: 3px; }
        
        .card {
            background: rgba(255, 255, 255, 0.03); /* Casi invisible en dark mode */
            border: 1px solid rgba(150, 150, 150, 0.2);
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body class="text-gray-800 dark:text-gray-200 font-sans antialiased p-2">

    <!-- LOADER -->
    <div id="loader" class="fixed inset-0 flex flex-col items-center justify-center z-50">
        <div class="w-6 h-6 border-2 border-red-500 border-t-transparent rounded-full animate-spin mb-2"></div>
        <span class="text-[10px] uppercase font-bold tracking-widest opacity-70">Cruzando Datos...</span>
    </div>

    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- HEADER -->
        <div class="flex flex-wrap justify-between items-end border-b border-gray-200 dark:border-gray-800 pb-2">
            <div>
                <h1 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-500 uppercase tracking-tighter">
                    Auditoría de Tiempo
                </h1>
                <p class="text-[10px] text-gray-500 font-mono">LIVE DATA FROM NOTION</p>
            </div>
            
            <!-- SELECTOR DE PERIODO -->
            <div class="flex bg-gray-100 dark:bg-gray-800 p-1 rounded-lg">
                <button onclick="update('day')" class="time-btn px-4 py-1 text-[10px] font-bold rounded hover:bg-white dark:hover:bg-gray-700 transition">DÍA</button>
                <button onclick="update('week')" class="time-btn px-4 py-1 text-[10px] font-bold rounded hover:bg-white dark:hover:bg-gray-700 transition">SEMANA</button>
                <button onclick="update('month')" class="time-btn px-4 py-1 text-[10px] font-bold rounded hover:bg-white dark:hover:bg-gray-700 transition">MES</button>
            </div>
        </div>

        <!-- KPIs SUPERIORES -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="kpi-container">
            <!-- Se inyecta con JS -->
        </div>

        <!-- GRÁFICOS -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <!-- CRONOLOGÍA (Ocupa 2/3) -->
            <div class="lg:col-span-2 card rounded-xl p-4">
                <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">Cronología Apilada</h3>
                <div class="h-60 relative w-full">
                    <canvas id="timelineChart"></canvas>
                </div>
            </div>

            <!-- DISTRIBUCIÓN (Ocupa 1/3) -->
            <div class="card rounded-xl p-4">
                <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">Distribución %</h3>
                <div class="h-60 relative w-full flex justify-center">
                    <canvas id="distChart"></canvas>
                </div>
            </div>
        </div>

        <!-- TABLA DE DETALLES -->
        <div class="card rounded-xl overflow-hidden">
            <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center">
                <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Desglose por Proyecto</h3>
                <span class="text-[10px] text-gray-500" id="total-projects-count">0 proyectos</span>
            </div>
            <div class="overflow-x-auto max-h-80">
                <table class="w-full text-sm text-left">
                    <thead class="text-[10px] text-gray-500 uppercase bg-gray-50 dark:bg-white/5 sticky top-0 backdrop-blur-md">
                        <tr>
                            <th class="px-4 py-2">Nombre del Proyecto</th>
                            <th class="px-4 py-2">Categoría</th>
                            <th class="px-4 py-2 text-right">Tiempo</th>
                            <th class="px-4 py-2 text-center w-24">Impacto</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-100 dark:divide-gray-800">
                        <!-- Se llena con JS -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- LOGICA -->
    <script>
        // CONFIGURACIÓN DE COLORES
        const COLORS = {
            'Trabajo': '#3b82f6',   // Azul
            'Negocios': '#f59e0b',  // Naranja
            'Personal': '#10b981',  // Verde
            'Otro': '#9ca3af'       // Gris
        };

        let rawSessions = [];
        let projectsDB = {}; // Diccionario { ID: {nombre, tipo} }
        let chartInstances = {};

        async function init() {
            try {
                const res = await fetch('datos.json');
                const json = await res.json();
                
                rawSessions = json.pomodoro || [];
                const rawProjects = json.proyectos || [];

                // 1. CREAR DICCIONARIO DE PROYECTOS
                // Esto es lo que garantiza la exactitud. Leemos la base de proyectos PRIMERO.
                rawProjects.forEach(p => {
                    const id = p.id;
                    const name = p.properties.Nombre?.title[0]?.plain_text || "Sin Nombre";
                    const typeRaw = p.properties.Tipo?.select?.name || "Otro";
                    
                    // Normalizamos el tipo para que coincida con los colores
                    let cleanType = "Otro";
                    if (typeRaw.includes("Trabajo")) cleanType = "Trabajo";
                    else if (typeRaw.includes("Negocio")) cleanType = "Negocios";
                    else if (typeRaw.includes("Personal")) cleanType = "Personal";

                    projectsDB[id] = { name, type: cleanType };
                });

                document.getElementById('loader').classList.add('hidden');
                update('week'); // Vista inicial
            } catch (e) {
                document.getElementById('loader').innerHTML = `<p class="text-red-500">Error: Verifica datos.json</p>`;
            }
        }

        function update(period) {
            // Actualizar botones UI
            document.querySelectorAll('.time-btn').forEach(b => {
                const active = b.innerText.toLowerCase() === period;
                b.className = `time-btn px-4 py-1 text-[10px] font-bold rounded transition ${active ? 'bg-white dark:bg-gray-700 text-blue-500 shadow' : 'text-gray-500 hover:bg-gray-200 dark:hover:bg-gray-800'}`;
            });

            const data = processData(period);
            renderKPIs(data);
            renderCharts(data, period);
            renderTable(data);
        }

        function processData(period) {
            const now = new Date();
            // Definir límites de tiempo
            const limit = period === 'day' ? 0 : period === 'week' ? 6 : 29;
            
            let timeline = {};
            let stats = { total: 0, Trabajo: 0, Negocios: 0, Personal: 0, Otro: 0 };
            let projectStats = {};

            // Inicializar timeline vacío (Eje X)
            for(let i=limit; i>=0; i--) {
                const d = new Date(); d.setDate(now.getDate() - i);
                timeline[d.toISOString().split('T')[0]] = { 'Trabajo':0, 'Negocios':0, 'Personal':0, 'Otro':0 };
            }

            // 2. PROCESAR SESIONES
            rawSessions.forEach(s => {
                const p = s.properties;
                // Fecha
                const dStr = p['Inicio 🍅']?.date?.start || s.created_time;
                const dKey = dStr.split('T')[0];

                if (timeline[dKey]) {
                    // Tiempo (Buscamos en todas las posibles columnas de tiempo)
                    const time = p['Enfoque 🍅']?.formula?.number || p['Tiempo']?.number || 0;
                    
                    if (time > 0) {
                        // CRUCE DE DATOS: Buscar el proyecto
                        let cat = "Otro";
                        let pName = "Sesión suelta";
                        
                        const rel = p['🔥 PROYECTOS']?.relation;
                        if (rel && rel.length > 0) {
                            const pid = rel[0].id;
                            if (projectsDB[pid]) {
                                cat = projectsDB[pid].type; // ¡Aquí tomamos la categoría real!
                                pName = projectsDB[pid].name;
                            }
                        }

                        // Acumuladores
                        stats.total += time;
                        stats[cat] += time;
                        timeline[dKey][cat] += time;

                        if (!projectStats[pName]) projectStats[pName] = { time: 0, cat: cat };
                        projectStats[pName].time += time;
                    }
                }
            });

            return {
                stats,
                timelineLabels: Object.keys(timeline).map(d => d.slice(5)), // MM-DD
                timelineData: timeline,
                projectStats
            };
        }

        // --- RENDERIZADO VISUAL ---

        function renderKPIs(d) {
            const container = document.getElementById('kpi-container');
            const kpi = (lbl, val, col) => `
                <div class="card rounded-lg p-3 text-center flex flex-col items-center justify-center">
                    <span class="text-xl font-black ${col}">${(val/60).toFixed(1)}h</span>
                    <span class="text-[9px] uppercase text-gray-500 font-bold tracking-widest mt-1">${lbl}</span>
                </div>`;

            container.innerHTML = `
                ${kpi('Total', d.stats.total, 'text-gray-800 dark:text-white')}
                ${kpi('Trabajo', d.stats.Trabajo, 'text-blue-500')}
                ${kpi('Negocios', d.stats.Negocios, 'text-orange-500')}
                ${kpi('Personal', d.stats.Personal, 'text-green-500')}
            `;
        }

        function renderCharts(d, period) {
            const ctx1 = document.getElementById('timelineChart').getContext('2d');
            const ctx2 = document.getElementById('distChart').getContext('2d');
            
            if (chartInstances.c1) chartInstances.c1.destroy();
            if (chartInstances.c2) chartInstances.c2.destroy();

            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
            const textColor = isDark ? '#9ca3af' : '#6b7280';

            // 1. TIMELINE STACKED
            const datasets = Object.keys(COLORS).map(k => ({
                label: k,
                data: Object.values(d.timelineData).map(day => day[k]),
                backgroundColor: COLORS[k],
                borderRadius: 2,
                stack: 'stack1'
            }));

            chartInstances.c1 = new Chart(ctx1, {
                type: 'bar',
                data: { labels: d.timelineLabels, datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { stacked: true, grid: { display: false }, ticks: { color: textColor, font: {size:9} } },
                        y: { stacked: true, grid: { color: gridColor }, ticks: { color: textColor, font: {size:9} } }
                    },
                    plugins: { legend: { display: false } },
                    animation: { y: { duration: 1000, from: 200 } }
                }
            });

            // 2. DONA
            const pieData = [d.stats.Trabajo, d.stats.Negocios, d.stats.Personal, d.stats.Otro];
            chartInstances.c2 = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(COLORS),
                    datasets: [{ data: pieData, backgroundColor: Object.values(COLORS), borderWidth: 0 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '75%',
                    plugins: { legend: { position: 'right', labels: { usePointStyle: true, boxWidth: 6, font: {size: 9}, color: textColor } } }
                }
            });
        }

        function renderTable(d) {
            const tbody = document.getElementById('table-body');
            const sorted = Object.entries(d.projectStats).sort((a,b) => b[1].time - a[1].time);
            
            document.getElementById('total-projects-count').innerText = `${sorted.length} activos`;

            // Máximo para barra de progreso relativa
            const maxTime = sorted.length > 0 ? sorted[0][1].time : 1;

            tbody.innerHTML = sorted.map(([name, val]) => `
                <tr class="hover:bg-white/5 transition-colors group">
                    <td class="px-4 py-2 font-medium text-xs text-gray-700 dark:text-gray-300">${name}</td>
                    <td class="px-4 py-2">
                        <span class="px-1.5 py-0.5 rounded text-[9px] font-bold uppercase tracking-wide border border-opacity-10"
                              style="background:${COLORS[val.cat]}15; color:${COLORS[val.cat]}; border-color:${COLORS[val.cat]}">
                            ${val.cat}
                        </span>
                    </td>
                    <td class="px-4 py-2 font-bold text-xs text-right">${val.time}m</td>
                    <td class="px-4 py-2 w-24">
                        <div class="w-full h-1 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                            <div class="h-full rounded-full" style="width:${(val.time/maxTime)*100}%; background:${COLORS[val.cat]}"></div>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        init();
    </script>
</body>
</html>
