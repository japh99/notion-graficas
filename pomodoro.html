<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Auditoría Relacional</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { notion: { bg: '#191919', card: '#202020', text: '#e5e5e5' } } } }
        }
    </script>
</head>
<body class="bg-transparent text-gray-800 dark:text-gray-200 p-4 font-sans antialiased">

    <!-- LOADER -->
    <div id="loader" class="fixed inset-0 flex flex-col items-center justify-center font-bold text-xs uppercase tracking-widest z-50">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-red-500 mb-2"></div>
        <span id="loader-text">Conectando Proyectos...</span>
    </div>

    <div class="max-w-6xl mx-auto space-y-6">
        <!-- HEADER -->
        <div class="flex flex-wrap justify-between items-center border-b border-gray-200 dark:border-gray-800 pb-4 gap-4">
            <div>
                <h1 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-600">AUDITORÍA DE PROYECTOS</h1>
                <p class="text-[10px] text-gray-500 font-mono mt-1">DATA SOURCE: NOTION RELATIONS</p>
            </div>
            <div class="flex bg-gray-100 dark:bg-gray-800 p-1 rounded-lg">
                <button onclick="update('day')" class="p-btn px-4 py-1.5 text-xs font-bold rounded-md transition-all">DÍA</button>
                <button onclick="update('week')" class="p-btn px-4 py-1.5 text-xs font-bold rounded-md transition-all">SEMANA</button>
                <button onclick="update('month')" class="p-btn px-4 py-1.5 text-xs font-bold rounded-md transition-all">MES</button>
            </div>
        </div>

        <!-- KPIs -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="kpi-grid"></div>

        <!-- GRAFICOS PRINCIPALES -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Stacked Bar (Cronología) -->
            <div class="lg:col-span-2 bg-white dark:bg-notion-card border border-gray-200 dark:border-gray-800 rounded-xl p-5 shadow-sm">
                <h3 class="text-xs font-bold text-gray-400 uppercase mb-4 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-blue-500"></span> Cronología por Tipo
                </h3>
                <div class="h-72 relative"><canvas id="mainChart"></canvas></div>
            </div>
            <!-- Pie Chart (Totales) -->
            <div class="bg-white dark:bg-notion-card border border-gray-200 dark:border-gray-800 rounded-xl p-5 shadow-sm">
                <h3 class="text-xs font-bold text-gray-400 uppercase mb-4">Distribución Total</h3>
                <div class="h-72 relative"><canvas id="pieChart"></canvas></div>
            </div>
        </div>

        <!-- TABLA DETALLADA -->
        <div class="bg-white dark:bg-notion-card border border-gray-200 dark:border-gray-800 rounded-xl overflow-hidden shadow-sm">
            <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-800">
                <h3 class="text-xs font-bold text-gray-400 uppercase">Detalle por Proyecto (Top 10)</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="text-xs text-gray-500 uppercase bg-gray-50 dark:bg-gray-800/50">
                        <tr>
                            <th class="px-6 py-3">Proyecto</th>
                            <th class="px-6 py-3">Tipo (Base de Datos)</th>
                            <th class="px-6 py-3">Tiempo Total</th>
                            <th class="px-6 py-3 text-right">Impacto</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-100 dark:divide-gray-800"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let sessions = [], projectsDB = {};
        let chartInstances = {};
        
        // COLORES EXACTOS PARA TUS TIPOS
        const COLORS = { 
            'Trabajo': '#3b82f6',   // Azul
            'Negocios': '#f59e0b',  // Naranja
            'Personal': '#10b981',  // Verde
            'Otro': '#9ca3af'       // Gris
        };

        async function init() {
            try {
                const res = await fetch('datos.json');
                const json = await res.json();
                
                sessions = json.pomodoro || [];
                const rawProjects = json.proyectos || [];

                // ---------------------------------------------------------
                // PASO 1: CONSTRUIR EL DICCIONARIO DE PROYECTOS (LOOKUP)
                // ---------------------------------------------------------
                // Aquí es donde leemos la base de datos "PROYECTOS" y guardamos
                // qué "Tipo" es cada ID.
                rawProjects.forEach(p => {
                    const name = p.properties.Nombre?.title[0]?.plain_text || "Sin nombre";
                    
                    // AQUI LEEMOS LA COLUMNA "Tipo" DE LA BASE DE DATOS DE PROYECTOS
                    const typeSelect = p.properties.Tipo?.select?.name || "Otro";
                    
                    // Normalizamos para evitar errores de mayúsculas/minúsculas
                    let cleanType = "Otro";
                    if (typeSelect.toLowerCase().includes("trabajo")) cleanType = "Trabajo";
                    else if (typeSelect.toLowerCase().includes("negocio")) cleanType = "Negocios";
                    else if (typeSelect.toLowerCase().includes("personal")) cleanType = "Personal";

                    // Guardamos en el diccionario: ID -> {Nombre, Tipo}
                    projectsDB[p.id] = { name: name, type: cleanType };
                });

                document.getElementById('loader').remove();
                update('week');
            } catch (e) { 
                document.getElementById('loader').innerHTML = `<p class="text-red-500">Error: Verifica DB_PROYECTOS en GitHub Secrets</p>`;
            }
        }

        function update(period) {
            // UI Botones
            document.querySelectorAll('.p-btn').forEach(b => {
                const active = b.innerText.toLowerCase() === period;
                b.className = `p-btn px-4 py-1.5 text-xs font-bold rounded-md transition-all ${active ? 'bg-gray-800 text-white dark:bg-white dark:text-black shadow-md' : 'text-gray-500 hover:bg-gray-200 dark:hover:bg-gray-800'}`;
            });

            const data = processData(period);
            renderKPIs(data.stats);
            renderCharts(data);
            renderTable(data.projStats, data.stats.total);
        }

        function processData(period) {
            const now = new Date();
            const limit = period === 'day' ? 0 : period === 'week' ? 6 : 29;
            
            let timeline = {};
            let projStats = {};
            let stats = { total: 0, work: 0, pers: 0, biz: 0, other: 0 };

            // Inicializar timeline vacío
            for(let i=limit; i>=0; i--) {
                const d = new Date(); d.setDate(now.getDate() - i);
                timeline[d.toISOString().split('T')[0]] = { 'Trabajo':0, 'Negocios':0, 'Personal':0, 'Otro':0 };
            }

            // ---------------------------------------------------------
            // PASO 2: CRUZAR DATOS (JOIN)
            // ---------------------------------------------------------
            sessions.forEach(s => {
                const p = s.properties;
                const dStr = p['Inicio 🍅']?.date?.start || s.created_time;
                const dKey = dStr.split('T')[0];

                if (timeline[dKey]) {
                    // Minutos de la sesión
                    const time = p['Enfoque 🍅']?.formula?.number || p['Tiempo']?.number || 0;
                    
                    // Buscamos la relación
                    const relations = p['🔥 PROYECTOS']?.relation;
                    
                    let category = 'Otro';
                    let pName = 'Sesión sin proyecto';

                    if (relations && relations.length > 0) {
                        const projectID = relations[0].id; // ID del proyecto vinculado
                        
                        // BUSCAMOS ESE ID EN NUESTRO DICCIONARIO
                        if (projectsDB[projectID]) {
                            category = projectsDB[projectID].type; // ¡Aquí obtenemos el tipo real!
                            pName = projectsDB[projectID].name;
                        }
                    }

                    if (time > 0) {
                        stats.total += time;
                        if (category === 'Trabajo') stats.work += time;
                        else if (category === 'Negocios') stats.biz += time;
                        else if (category === 'Personal') stats.pers += time;
                        else stats.other += time;

                        // Llenar gráficos y tablas
                        timeline[dKey][category] += time;
                        
                        if (!projStats[pName]) projStats[pName] = { time: 0, cat: category };
                        projStats[pName].time += time;
                    }
                }
            });

            return { 
                stats, 
                timelineLabels: Object.keys(timeline).map(d => d.slice(5)), 
                timelineData: timeline,
                projStats 
            };
        }

        // RENDERIZADO VISUAL
        function renderKPIs(s) {
            const kpi = (l, v, c) => `
                <div class="bg-gray-50 dark:bg-gray-800/50 rounded-xl p-4 border border-gray-100 dark:border-gray-800 text-center">
                    <div class="text-2xl font-black ${c}">${(v/60).toFixed(1)}h</div>
                    <div class="text-[10px] uppercase text-gray-400 font-bold tracking-wider mt-1">${l}</div>
                </div>`;
                
            document.getElementById('kpi-grid').innerHTML = `
                ${kpi('Total', s.total, 'text-gray-800 dark:text-white')}
                ${kpi('Trabajo', s.work, 'text-blue-500')}
                ${kpi('Negocios', s.biz, 'text-orange-500')}
                ${kpi('Personal', s.pers, 'text-green-500')}
            `;
        }

        function renderCharts(d) {
            const ctx1 = document.getElementById('mainChart').getContext('2d');
            const ctx2 = document.getElementById('pieChart').getContext('2d');
            
            if(chartInstances.main) chartInstances.main.destroy();
            if(chartInstances.pie) chartInstances.pie.destroy();

            const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const gridColor = isDark ? '#33333333' : '#e5e7eb';
            const textColor = isDark ? '#9ca3af' : '#6b7280';

            // Chart 1: Stacked Bar
            chartInstances.main = new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: d.timelineLabels,
                    datasets: Object.keys(COLORS).map(k => ({
                        label: k, data: Object.values(d.timelineData).map(v => v[k]), backgroundColor: COLORS[k], borderRadius: 4, stack: 'stack1'
                    }))
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { x: { grid: { display: false }, ticks: { color: textColor } }, y: { grid: { color: gridColor }, ticks: { color: textColor } } },
                    plugins: { legend: { display: false } }
                }
            });

            // Chart 2: Doughnut
            chartInstances.pie = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: ['Trabajo', 'Negocios', 'Personal', 'Otro'],
                    datasets: [{ data: [d.stats.work, d.stats.biz, d.stats.pers, d.stats.other], backgroundColor: Object.values(COLORS), borderWidth: 0 }]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, cutout: '75%',
                    plugins: { legend: { position: 'right', labels: { usePointStyle: true, boxWidth: 8, font: {size: 10}, color: textColor } } }
                }
            });
        }

        function renderTable(projs, total) {
            const sorted = Object.entries(projs).sort((a,b) => b[1].time - a[1].time).slice(0, 10);
            
            document.getElementById('table-body').innerHTML = sorted.map(([n, v]) => `
                <tr class="hover:bg-gray-50 dark:hover:bg-white/5 transition-colors group">
                    <td class="px-6 py-3 font-medium text-gray-900 dark:text-gray-100 group-hover:text-blue-500 transition-colors">${n}</td>
                    <td class="px-6 py-3">
                        <span class="px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wide border border-opacity-20" 
                              style="background:${COLORS[v.cat]}15; color:${COLORS[v.cat]}; border-color:${COLORS[v.cat]}">
                            ${v.cat}
                        </span>
                    </td>
                    <td class="px-6 py-3 font-bold text-gray-700 dark:text-gray-300">${v.time} min</td>
                    <td class="px-6 py-3 text-right w-32">
                        <div class="w-full h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                            <div class="h-full rounded-full transition-all duration-1000" style="width:${(v.time/total)*100}%; background:${COLORS[v.cat]}"></div>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        init();
    </script>
</body>
</html>
