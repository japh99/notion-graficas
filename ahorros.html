<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Ahorros</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f5f5f5;
            --text-primary: #2c2c2c; --text-secondary: #6b6b6b;
            --accent: #8b5cf6; --accent-light: #a78bfa;
            --border: #e0e0e0; --card-bg: #ffffff';
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #191919; --bg-secondary: '#252525';
                --text-primary: #ffffff; --text-secondary: #a0a0a0;
                --accent: #a78bfa; --accent-light: #c4b5fd;
                --border: #2f2f2f; --card-bg: #202020;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
        .hero-card { background: linear-gradient(135deg, var(--accent), var(--accent-light)); border-radius: 16px; padding: 2rem; color: white; text-align: center; margin-bottom: 2rem; }
        .hero-value { font-size: 3rem; font-weight: 700; }
        .hero-label { font-size: 0.9rem; opacity: 0.9; margin-top: 0.5rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.85rem; color: var(--text-secondary); }
        .chart-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
        .chart-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
        .chart-wrapper { position: relative; height: 300px; }
        .savings-list { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
        .list-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
        .saving-item { display: flex; justify-content: space-between; padding: 0.75rem; border-bottom: 1px solid var(--border); }
        .saving-item:last-child { border-bottom: none; }
        .saving-info { flex: 1; }
        .saving-name { font-weight: 600; }
        .saving-meta { font-size: 0.75rem; color: var(--text-secondary); }
        .saving-amount { font-weight: 700; color: var(--accent); }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-secondary); }
        .loading { text-align: center; padding: 3rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏦 Ahorros</h1>
        <p class="subtitle">Última actualización: <span id="lastUpdate">Cargando...</span></p>
        
        <div class="hero-card">
            <div class="hero-value" id="totalAhorro">$0</div>
            <div class="hero-label">Total Ahorrado (vía egresos marcados como Ahorro)</div>
        </div>
        
        <div class="stats-grid" id="statsGrid"><div class="loading">Calculando...</div></div>
        
        <div class="chart-container">
            <div class="chart-title">Evolución de Ahorros por Mes</div>
            <div class="chart-wrapper"><canvas id="savingsChart"></canvas></div>
        </div>
        
        <div class="savings-list">
            <div class="list-title">Movimientos de Ahorro</div>
            <div id="savingsList"></div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('datos.json');
                const data = await response.json();
                document.getElementById('lastUpdate').textContent = data.metadata?.ultima_actualizacion || 'Desconocida';
                
                // Usar egresos donde el campo "Ahorro" sea "Sí" o similar
                const egresos = data.datos?.egresos || [];
                processSavings(egresos);
            } catch (error) {
                document.getElementById('statsGrid').innerHTML = `<div style="color: var(--accent);">Error: ${error.message}</div>`;
            }
        }

        function processSavings(egresos) {
            // Filtrar egresos que son ahorros (campo "Ahorro" en egresos)
            // Nota: En tu estructura de egresos no veo campo "Ahorro", pero lo buscamos
            const ahorros = egresos.filter(e => {
                const p = e.properties || {};
                // Buscar cualquier indicación de ahorro en el tipo o items
                const tipo = p.Tipo?.multi_select?.map(t => t.name).join(' ') || '';
                const items = p.Items?.title?.[0]?.plain_text || '';
                return tipo.toLowerCase().includes('ahorro') || 
                       items.toLowerCase().includes('ahorro') ||
                       items.toLowerCase().includes('inversión') ||
                       items.toLowerCase().includes('fondo');
            });

            if (ahorros.length === 0) {
                // Si no hay ahorros específicos, mostrar mensaje
                document.getElementById('totalAhorro').textContent = '$0';
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card" style="grid-column: 1/-1;">
                        <div class="stat-value">0</div>
                        <div class="stat-label">No se detectaron egresos marcados como Ahorro</div>
                    </div>
                `;
                document.getElementById('savingsList').innerHTML = `
                    <div class="empty-state">
                        💡 Tip: Marca tus egresos de ahorro con "Ahorro" en el campo Tipo o Items
                    </div>
                `;
                return;
            }

            const processed = ahorros.map(a => {
                const p = a.properties || {};
                return {
                    monto: p.Monto?.number || 0,
                    mes: p.Mes?.select?.name || 'Sin mes',
                    items: p.Items?.title?.[0]?.plain_text || 'Sin descripción',
                    fecha: p.Fecha?.date?.start
                };
            });

            const total = processed.reduce((s, a) => s + a.monto, 0);

            document.getElementById('totalAhorro').textContent = '$' + (total / 1000000).toFixed(2) + 'M';
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${processed.length}</div>
                    <div class="stat-label">Movimientos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">$${Math.round(total / processed.length / 1000)}K</div>
                    <div class="stat-label">Promedio</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${new Set(processed.map(a => a.mes)).size}</div>
                    <div class="stat-label">Meses con ahorro</div>
                </div>
            `;

            renderChart(processed);
            renderList(processed);
        }

        function renderChart(ahorros) {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const textColor = isDark ? '#ffffff' : '#2c2c2c';
            const gridColor = isDark ? '#2f2f2f' : '#e0e0e0';

            const porMes = {};
            ahorros.forEach(a => {
                porMes[a.mes] = (porMes[a.mes] || 0) + a.monto;
            });

            new Chart(document.getElementById('savingsChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(porMes),
                    datasets: [{
                        label: 'Ahorro ($)',
                        data: Object.values(porMes),
                        backgroundColor: '#8b5cf6',
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: gridColor }, ticks: { color: textColor, callback: v => '$' + (v / 1000) + 'K' } },
                        x: { grid: { display: false }, ticks: { color: textColor } }
                    }
                }
            });
        }

        function renderList(ahorros) {
            document.getElementById('savingsList').innerHTML = ahorros.slice(-5).reverse().map(a => `
                <div class="saving-item">
                    <div class="saving-info">
                        <div class="saving-name">${a.items}</div>
                        <div class="saving-meta">${a.mes}</div>
                    </div>
                    <div class="saving-amount">+$${a.monto.toLocaleString()}</div>
                </div>
            `).join('');
        }

        loadData();
    </script>
</body>
</html>
