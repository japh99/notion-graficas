<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Balance General</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f5f5f5;
            --text-primary: #2c2c2c; --text-secondary: #6b6b6b;
            --accent: #6366f1; --accent-light: #818cf8;
            --border: #e0e0e0; --success: #10b981; --danger: #ef4444;
            --card-bg: #ffffff';
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #191919; --bg-secondary: '#252525';
                --text-primary: #ffffff; --text-secondary: #a0a0a0;
                --accent: #818cf8; --accent-light: #a5b4fc;
                --border: #2f2f2f; --success: #34d399; --danger: #f87171;
                --card-bg: #202020;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
        .balance-hero { background: linear-gradient(135deg, var(--accent), var(--accent-light)); border-radius: 16px; padding: 2rem; color: white; text-align: center; margin-bottom: 2rem; }
        .balance-label { font-size: 0.9rem; opacity: 0.9; }
        .balance-value { font-size: 3.5rem; font-weight: 700; margin: 0.5rem 0; }
        .balance-breakdown { display: flex; justify-content: center; gap: 2rem; font-size: 0.9rem; margin-top: 1rem; }
        .breakdown-item { display: flex; align-items: center; gap: 0.5rem; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-income { background: #34d399; }
        .dot-expense { background: #f87171; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; text-align: center; }
        .stat-value { font-size: 1.8rem; font-weight: 700; }
        .stat-value.positive { color: var(--success); }
        .stat-value.negative { color: var(--danger); }
        .stat-label { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .chart-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
        .chart-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
        .chart-wrapper { position: relative; height: 300px; }
        .loading { text-align: center; padding: 3rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚖️ Balance Financiero</h1>
        <p class="subtitle">Última actualización: <span id="lastUpdate">Cargando...</span></p>
        
        <div class="balance-hero">
            <div class="balance-label">Balance Neto</div>
            <div class="balance-value" id="netBalance">$0</div>
            <div class="balance-breakdown">
                <div class="breakdown-item">
                    <div class="dot dot-income"></div>
                    <span>Ingresos: <strong id="totalIncome">$0</strong></span>
                </div>
                <div class="breakdown-item">
                    <div class="dot dot-expense"></div>
                    <span>Egresos: <strong id="totalExpense">$0</strong></span>
                </div>
            </div>
        </div>
        
        <div class="stats-grid" id="statsGrid"><div class="loading">Calculando...</div></div>
        
        <div class="charts-grid">
            <div class="chart-container">
                <div class="chart-title">Flujo de Caja por Mes</div>
                <div class="chart-wrapper"><canvas id="cashflowChart"></canvas></div>
            </div>
            <div class="chart-container">
                <div class="chart-title">Distribución</div>
                <div class="chart-wrapper"><canvas id="pieChart"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('datos.json');
                const data = await response.json();
                document.getElementById('lastUpdate').textContent = data.metadata?.ultima_actualizacion || 'Desconocida';
                
                const ingresos = data.datos?.ingresos || [];
                const egresos = data.datos?.egresos || [];
                processBalance(ingresos, egresos);
            } catch (error) {
                document.getElementById('statsGrid').innerHTML = `<div style="color: var(--danger);">Error: ${error.message}</div>`;
            }
        }

        function processBalance(ingresos, egresos) {
            // Procesar ingresos
            const ingresosProc = ingresos.map(i => {
                const p = i.properties || {};
                return {
                    monto: p.Monto?.number || 0,
                    mes: p.Mes?.select?.name || 'Sin mes'
                };
            });

            // Procesar egresos
            const egresosProc = egresos.map(e => {
                const p = e.properties || {};
                return {
                    monto: p.Monto?.number || 0,
                    mes: p.Mes?.select?.name || 'Sin mes'
                };
            });

            const totalIng = ingresosProc.reduce((s, i) => s + i.monto, 0);
            const totalEgr = egresosProc.reduce((s, e) => s + e.monto, 0);
            const balance = totalIng - totalEgr;

            document.getElementById('netBalance').textContent = (balance >= 0 ? '+' : '') + '$' + (balance / 1000000).toFixed(2) + 'M';
            document.getElementById('netBalance').style.color = balance >= 0 ? '#34d399' : '#f87171';
            document.getElementById('totalIncome').textContent = '$' + (totalIng / 1000000).toFixed(2) + 'M';
            document.getElementById('totalExpense').textContent = '$' + (totalEgr / 1000000).toFixed(2) + 'M';

            // Calcular ratio de ahorro
            const ratioAhorro = totalIng > 0 ? ((totalIng - totalEgr) / totalIng * 100) : 0;

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value ${ratioAhorro >= 0 ? 'positive' : 'negative'}">${ratioAhorro.toFixed(1)}%</div>
                    <div class="stat-label">Margen de Ahorro</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${ingresosProc.length}</div>
                    <div class="stat-label">Ingresos Registrados</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${egresosProc.length}</div>
                    <div class="stat-label">Egresos Registrados</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${new Set([...ingresosProc.map(i => i.mes), ...egresosProc.map(e => e.mes)]).size}</div>
                    <div class="stat-label">Meses con Movimiento</div>
                </div>
            `;

            renderCharts(ingresosProc, egresosProc);
        }

        function renderCharts(ingresos, egresos) {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const textColor = isDark ? '#ffffff' : '#2c2c2c';
            const gridColor = isDark ? '#2f2f2f' : '#e0e0e0';

            // Combinar meses
            const meses = [...new Set([...ingresos.map(i => i.mes), ...egresos.map(e => e.mes)])];
            const porMes = {};
            meses.forEach(m => {
                porMes[m] = {
                    ingresos: ingresos.filter(i => i.mes === m).reduce((s, i) => s + i.monto, 0),
                    egresos: egresos.filter(e => e.mes === m).reduce((s, e) => s + e.monto, 0)
                };
            });

            new Chart(document.getElementById('cashflowChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(porMes),
                    datasets: [{
                        label: 'Ingresos',
                        data: Object.values(porMes).map(m => m.ingresos),
                        backgroundColor: '#10b981',
                        borderRadius: 4
                    }, {
                        label: 'Egresos',
                        data: Object.values(porMes).map(m => m.egresos),
                        backgroundColor: '#ef4444',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: textColor } } },
                    scales: {
                        y: { grid: { color: gridColor }, ticks: { color: textColor, callback: v => '$' + (v / 1000) + 'K' } },
                        x: { grid: { display: false }, ticks: { color: textColor } }
                    }
                }
            });

            // Pie chart
            const totalIng = ingresos.reduce((s, i) => s + i.monto, 0);
            const totalEgr = egresos.reduce((s, e) => s + e.monto, 0);
            const ahorro = Math.max(0, totalIng - totalEgr);

            new Chart(document.getElementById('pieChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Egresos', 'Ahorro/Disponible'],
                    datasets: [{
                        data: [totalEgr, ahorro],
                        backgroundColor: ['#ef4444', '#10b981'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: { legend: { position: 'bottom', labels: { color: textColor } } }
                }
            });
        }

        loadData();
    </script>
</body>
</html>
