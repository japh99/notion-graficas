<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Balance General</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>⚖️ Balance Financiero</h1>
        <p class="subtitle">Última actualización: <span id="lastUpdate">Cargando...</span></p>
        
        <div class="balance-hero">
            <div class="balance-label">Balance Neto del Mes</div>
            <div class="balance-value" id="netBalance">$0</div>
            <div class="balance-breakdown">
                <div class="breakdown-item">
                    <div class="breakdown-dot dot-income"></div>
                    <span>Ingresos: <strong id="totalIncome">$0</strong></span>
                </div>
                <div class="breakdown-item">
                    <div class="breakdown-dot dot-expense"></div>
                    <span>Egresos: <strong id="totalExpense">$0</strong></span>
                </div>
            </div>
        </div>
        
        <div class="metrics-grid" id="metricsGrid">
            <div class="loading">Calculando métricas...</div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-container">
                <div class="chart-title">Flujo de Caja (Últimos 6 meses)</div>
                <div class="chart-wrapper">
                    <canvas id="cashflowChart"></canvas>
                </div>
            </div>
            
            <div class="chart-container">
                <div class="chart-title">Composición Financiera</div>
                <div class="chart-wrapper">
                    <canvas id="compositionChart"></canvas>
                </div>
            </div>
        </div>
        
        <div class="insights-panel">
            <div class="chart-title">📊 Insights Financieros</div>
            <div id="insightsList"></div>
        </div>
    </div>    <script src="js/balance.js"></script>
</body>
</html>
