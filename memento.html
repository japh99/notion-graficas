<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Memento Mori</title>    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>☠️ Memento Mori</h1>
            <p class="subtitle">"Recuerda que vas a morir. Recuerda que eres mortal."</p>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="lifeProgress" style="width: 0%">0%</div>
            </div>
            <div class="progress-labels">
                <span>Nacimiento</span>
                <span>Esperanza de vida: 80 años</span>
                <span>Final</span>
            </div>
        </div>
        
        <div class="stats" id="stats">
            <div class="stat">
                <div class="stat-value" id="edadActual">--</div>
                <div class="stat-label">Edad Actual</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="añosRestantes">--</div>
                <div class="stat-label">Años Restantes</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="cuentaRegresiva">--</div>
                <div class="stat-label">Cuenta Regresiva</div>
            </div>
        </div>
        
        <div class="months-grid" id="monthsGrid"></div>
        
        <div class="quote" id="quote"></div>
    </div>    <script src="js/memento.js"></script>
</body>
</html>
