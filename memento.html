<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Memento Mori</title>
    <style>
        :root {
            --bg-primary: #0a0a0a; --bg-secondary: #141414;
            --text-primary: #e5e5e5; --text-secondary: #737373;
            --accent: #dc2626; --accent-light: #ef4444;
            --border: #262626;
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: #fafafa; --bg-secondary: #f0f0f0;
                --text-primary: #171717; --text-secondary: #525252;
                --accent: #dc2626; --accent-light: #ef4444;
                --border: #e5e5e5;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); padding: 20px; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 3rem; padding: 2rem; border: 1px solid var(--border); border-radius: 16px; }
        h1 { font-size: 2rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); }
        .subtitle { color: var(--text-secondary); font-style: italic; margin-top: 0.5rem; }
        .progress-container { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; margin-bottom: 2rem; }
        .progress-bar { height: 20px; background: var(--border); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-light)); border-radius: 10px; transition: width 2s ease; }
        .progress-text { display: flex; justify-content: space-between; margin-top: 0.5rem; font-size: 0.8rem; color: var(--text-secondary); }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat { text-align: center; padding: 1.5rem; border: 1px solid var(--border); border-radius: 12px; }
        .stat-value { font-size: 2.5rem; font-weight: 200; color: var(--accent); }
        .stat-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.5rem; }
        .quote { text-align: center; margin-top: 3rem; padding: 2rem; font-style: italic; color: var(--text-secondary); border-top: 1px solid var(--border); }
        .loading { text-align: center; padding: 3rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Memento Mori</h1>
            <p class="subtitle">"No cuentes los años, sino las horas."</p>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="lifeProgress" style="width: 0%"></div>
            </div>
            <div class="progress-text">
                <span>Nacimiento</span>
                <span id="progressPercent">0%</span>
                <span>80 años</span>
            </div>
        </div>
        
        <div class="stats" id="stats">
            <div class="loading">Calculando...</div>
        </div>
        
        <div class="quote" id="quote"></div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('datos.json');
                const data = await response.json();
                
                // NOMBRES EXACTOS: Año (number), Edad Actual (rollup/number)
                const memento = data.datos?.memento || data.memento || [];
                processMemento(memento);
            } catch (error) {
                document.getElementById('stats').innerHTML = `<div style="color: var(--accent);">Error: ${error.message}</div>`;
            }
        }

        function processMemento(memento) {
            if (memento.length === 0) {
                // Usar valores por defecto si no hay datos
                renderDefault();
                return;
            }

            const props = memento[0].properties || {};
            
            // NOMBRES EXACTOS:
            const edadActual = props.Edad_Actual?.rollup?.number || 
                              props.Edad_Actual?.number || 
                              props.Edad?.number || 30;
            
            const anioActual = props.Año?.number || new Date().getFullYear();
            
            const esperanzaVida = 80;
            const porcentaje = (edadActual / esperanzaVida) * 100;
            const añosRestantes = esperanzaVida - edadActual;
            const semanasRestantes = añosRestantes * 52;

            document.getElementById('lifeProgress').style.width = porcentaje + '%';
            document.getElementById('progressPercent').textContent = porcentaje.toFixed(1) + '%';

            document.getElementById('stats').innerHTML = `
                <div class="stat">
                    <div class="stat-value">${edadActual}</div>
                    <div class="stat-label">Edad Actual</div>
                </div>
                <div class="stat">
                    <div class="stat-value">${añosRestantes}</div>
                    <div class="stat-label">Años Restantes</div>
                </div>
                <div class="stat">
                    <div class="stat-value">${semanasRestantes}</div>
                    <div class="stat-label">Semanas Restantes</div>
                </div>
            `;

            const frases = [
                "El problema no es que la vida sea corta, sino que la desperdiciamos.",
                "No te actas añorum, sed horarum. No cuentes los años, sino las horas.",
                "Vive como si fueras a morir mañana. Aprende como si fueras a vivir para siempre.",
                "El tiempo es el único capital que los humanos tienen, y solo pueden perderlo.",
                "Memento mori: Recuerda que vas a morir. Recuerda que eres mortal."
            ];

            document.getElementById('quote').textContent = frases[Math.floor(Math.random() * frases.length)];
        }

        function renderDefault() {
            const edad = 30;
            const esperanza = 80;
            const pct = (edad / esperanza) * 100;
            
            document.getElementById('lifeProgress').style.width = pct + '%';
            document.getElementById('progressPercent').textContent = pct.toFixed(1) + '%';
            
            document.getElementById('stats').innerHTML = `
                <div class="stat">
                    <div class="stat-value">--</div>
                    <div class="stat-label">Edad Actual</div>
                </div>
                <div class="stat">
                    <div class="stat-value">--</div>
                    <div class="stat-label">Años Restantes</div>
                </div>
                <div class="stat">
                    <div class="stat-value">--</div>
                    <div class="stat-label">Semanas Restantes</div>
                </div>
            `;
            
            document.getElementById('quote').textContent = "Configura tu base de datos Memento Mori con Año y Edad Actual.";
        }

        loadData();
    </script>
</body>
</html>
