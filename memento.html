<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Memento Mori</title>
    <style>
        :root {
            --bg-primary: #0a0a0a; --bg-secondary: #141414;
            --text-primary: #e5e5e5; --text-secondary: #737373;
            --accent: #dc2626; --accent-light: #ef4444;
            --border: #262626;
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: #fafafa; --bg-secondary: #f0f0f0;
                --text-primary: #171717; --text-secondary: #525252;
                --accent: #dc2626; --accent-light: #ef4444;
                --border: #e5e5e5;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); padding: 20px; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 2rem; padding: 1.5rem; border-bottom: 1px solid var(--border); }
        h1 { font-size: 1.8rem; font-weight: 300; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); }
        .subtitle { color: var(--text-secondary); font-style: italic; margin-top: 0.5rem; font-size: 0.9rem; }
        
        .progress-container { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin-bottom: 2rem; }
        .progress-bar { height: 12px; background: var(--border); border-radius: 10px; overflow: hidden; position: relative; margin-bottom: 10px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-light)); transition: width 2s cubic-bezier(0.4, 0, 0.2, 1); }
        .progress-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }

        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat { text-align: center; padding: 1.5rem; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px; transition: transform 0.3s ease; }
        .stat:hover { transform: translateY(-5px); border-color: var(--accent); }
        .stat-value { font-size: 2.2rem; font-weight: 800; color: var(--accent); line-height: 1; }
        .stat-label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.8rem; }
        
        .grid-title { font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; text-align: center; margin-bottom: 1rem; letter-spacing: 0.1em; }
        .months-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 6px; margin-bottom: 2rem; }
        .month-box { aspect-ratio: 1; border-radius: 4px; background: var(--border); position: relative; }
        .month-lived { background: var(--accent); opacity: 0.8; }
        .month-current { background: var(--accent); box-shadow: 0 0 15px var(--accent); animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .quote { text-align: center; margin-top: 2rem; padding: 1.5rem; font-style: italic; color: var(--text-secondary); font-size: 1rem; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Memento Mori</h1>
            <p class="subtitle">"No es que tengamos poco tiempo, sino que perdemos mucho." — Séneca</p>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="lifeProgress" style="width: 0%"></div>
            </div>
            <div class="progress-labels">
                <span>0 años</span>
                <span id="progressText">0% vivido</span>
                <span id="limitText">80 años</span>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="edadActual">--</div>
                <div class="stat-label">Edad Actual</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="añosRestantes">--</div>
                <div class="stat-label">Inviernos Restantes</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="semanasRestantes">--</div>
                <div class="stat-label">Semanas de Vida</div>
            </div>
        </div>

        <div class="grid-title">Tu recorrido en el año actual</div>
        <div class="months-grid" id="monthsGrid"></div>
        
        <div class="quote" id="quote"></div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('datos.json');
                const data = await response.json();
                
                // Conexión flexible a la base de datos
                const memento = data.memento || (data.datos && data.datos.memento) || [];
                processMemento(memento);
            } catch (error) {
                console.error("Error cargando memento:", error);
                renderDefault();
            }
        }

        function processMemento(memento) {
            if (memento.length === 0) {
                renderDefault();
                return;
            }

            // Buscamos el registro que contenga la Edad Actual (Rollup)
            const registro = memento.find(m => m.properties['Edad Actual']?.rollup?.number !== undefined) || memento[0];
            const p = registro.properties || {};
            
            // EXTRACCIÓN DE DATOS REALES (Priorizando lo que me dijiste: 26 años)
            const edadActual = p['Edad Actual']?.rollup?.number || 26; 
            const añoEsperanza = p.Año?.number || 80;
            const cuentaRegresiva = p['Cuenta Regresiva']?.formula?.number || (añoEsperanza - edadActual);
            
            // Cálculo de porcentaje
            const porcentajeVivido = (edadActual / añoEsperanza) * 100;
            const semanasRestantes = Math.floor(cuentaRegresiva * 52.14);

            // ACTUALIZAR INTERFAZ
            document.getElementById('lifeProgress').style.width = porcentajeVivido + '%';
            document.getElementById('progressText').textContent = porcentajeVivido.toFixed(1) + '% VIVIDO';
            document.getElementById('limitText').textContent = añoEsperanza + ' AÑOS';
            
            document.getElementById('edadActual').textContent = edadActual;
            document.getElementById('añosRestantes').textContent = cuentaRegresiva;
            document.getElementById('semanasRestantes').textContent = semanasRestantes.toLocaleString();

            // RENDERIZAR CUADROS DE MESES (Basado en checkboxes de Notion)
            renderMonths(p);
            
            // Frases estoicas
            const frases = [
                "La vida es muy corta y ansiosa para aquellos que olvidan el pasado, descuidan el presente y temen al futuro.",
                "Trata cada día como una vida separada.",
                "No es que la vida sea corta, es que desperdiciamos mucha de ella.",
                "La muerte no es algo en el futuro, es algo que está sucediendo ahora mismo; lo que ha pasado ya le pertenece a la muerte.",
                "Memento Mori: Haz que este momento cuente."
            ];
            document.getElementById('quote').textContent = frases[Math.floor(Math.random() * frases.length)];
        }

        function renderMonths(props) {
            const mesesTags = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
            const hoy = new Date();
            const mesActualIdx = hoy.getMonth();
            
            const html = mesesTags.map((mes, idx) => {
                const isLivedInNotion = props[mes]?.checkbox === true;
                let className = 'month-box';
                
                if (isLivedInNotion || idx < mesActualIdx) className += ' month-lived';
                if (idx === mesActualIdx) className += ' month-current';
                
                return `<div class="${className}" title="${mes}"></div>`;
            }).join('');
            
            document.getElementById('monthsGrid').innerHTML = html;
        }

        function renderDefault() {
            const edad = 26;
            const esperanza = 80;
            const porcentaje = (edad / esperanza) * 100;
            document.getElementById('lifeProgress').style.width = porcentaje + '%';
            document.getElementById('edadActual').textContent = edad;
            document.getElementById('añosRestantes').textContent = esperanza - edad;
            document.getElementById('semanasRestantes').textContent = ((esperanza - edad) * 52).toLocaleString();
            document.getElementById('quote').textContent = "Conecta tu base de datos para ver tu progreso real.";
        }

        loadData();
    </script>
</body>
</html>
