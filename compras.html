<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Compras</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f5f5f5;
            --text-primary: #2c2c2c; --text-secondary: #6b6b6b;
            --accent: #f59e0b; --accent-light: #fbbf24;
            --border: #e0e0e0; --success: #10b981;
            --card-bg: #ffffff';
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #191919; --bg-secondary: '#252525';
                --text-primary: #ffffff; --text-secondary: #a0a0a0;
                --accent: #fbbf24; --accent-light: #fcd34d;
                --border: #2f2f2f; --success: #34d399;
                --card-bg: #202020;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
        .empty-state { background: var(--card-bg); border: 2px dashed var(--border); border-radius: 16px; padding: 3rem; text-align: center; color: var(--text-secondary); }
        .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
        .empty-title { font-size: 1.2rem; font-weight: 600; color: var(--text-primary); margin-bottom: 0.5rem; }
        .loading { text-align: center; padding: 3rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 Compras / Wishlist</h1>
        <p class="subtitle">Última actualización: <span id="lastUpdate">Cargando...</span></p>
        
        <div id="content">
            <div class="loading">Verificando datos...</div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('datos.json');
                const data = await response.json();
                document.getElementById('lastUpdate').textContent = data.metadata?.ultima_actualizacion || 'Desconocida';
                
                const compras = data.datos?.compras || [];
                
                if (compras.length === 0) {
                    document.getElementById('content').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">🛒</div>
                            <div class="empty-title">No hay datos de compras</div>
                            <p>Tu base de datos "Compras" está vacía.</p>
                            <p style="margin-top: 1rem; font-size: 0.9rem;">
                                Agrega items con columnas:<br>
                                • <strong>Nombre</strong> (title)<br>
                                • <strong>Precio</strong> (number)<br>
                                • <strong>Comprado</strong> (checkbox)
                            </p>
                        </div>
                    `;
                    return;
                }
                
                // Si hay datos, procesarlos (estructura esperada)
                processCompras(compras);
            } catch (error) {
                document.getElementById('content').innerHTML = `<div style="color: #ef4444;">Error: ${error.message}</div>`;
            }
        }

        function processCompras(compras) {
            // Estructura esperada cuando tengas datos:
            // • Nombre (title)
            // • Precio (number)
            // • Comprado (checkbox)
            
            const processed = compras.map(c => {
                const p = c.properties || {};
                return {
                    nombre: p.Nombre?.title?.[0]?.plain_text || 'Sin nombre',
                    precio: p.Precio?.number || 0,
                    comprado: p.Comprado?.checkbox === true
                };
            });

            const total = processed.reduce((s, c) => s + c.precio, 0);
            const comprados = processed.filter(c => c.comprado);
            const pendientes = processed.filter(c => !c.comprado);
            const totalComprado = comprados.reduce((s, c) => s + c.precio, 0);
            
            // Aquí iría el HTML completo cuando tengas datos
            document.getElementById('content').innerHTML = `
                <div style="background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 2rem;">
                    <h3>✅ Datos encontrados: ${processed.length} items</h3>
                    <p>Total valor: $${total.toLocaleString()}</p>
                    <p>Comprados: ${comprados.length} ($${totalComprado.toLocaleString()})</p>
                    <p>Pendientes: ${pendientes.length}</p>
                    <p style="margin-top: 1rem; color: var(--text-secondary);">
                        (Dashboard completo disponible cuando confirmes la estructura de datos)
                    </p>
                </div>
            `;
        }

        loadData();
    </script>
</body>
</html>
