
    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="utf-8">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <style>
            body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display:flex; flex-direction:column; align-items:center; color: #EBEBEB; background-color: transparent; margin: 0; padding: 10px; }
            .chart-container { width: 100%; max-width: 320px; margin-top: 10px; }
            .insight-box { background-color: #2F2F2F; border-left: 5px solid #ff6384; padding: 15px; border-radius: 8px; max-width: 400px; margin-top: 20px; font-size: 14px; line-height: 1.5; box-shadow: 0 4px 6px rgba(0,0,0,0.3); color: #EBEBEB; }
            h3 { margin-bottom: 0; color: #ffffff; font-weight: 600; text-align: center; }
            b { color: #ffffff; }
        </style>
    </head>
    <body>
        <h3>Distribución de Gastos</h3>
        <div class="chart-container"><canvas id="miGrafica"></canvas></div>
        <div class="insight-box">💸 <b>Egresos:</b> Total gastado: <b>$0 COP</b>.<br>Mayor fuga: <b>Ninguna</b>.</div>
        <script>
            Chart.defaults.color = '#A0A0A0';
            new Chart(document.getElementById('miGrafica'), {
                type: 'doughnut',
                data: { labels: [], datasets:[{ data: [], backgroundColor: ["#ff6384", "#36a2eb", "#cc65fe", "#ffce56", "#4bc0c0"], borderWidth: 0 }] },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });
        </script>
    </body>
    </html>
