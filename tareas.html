<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Tareas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f5f5f5;
            --text-primary: #2c2c2c; --text-secondary: #6b6b6b;
            --accent: #3b82f6; --accent-light: #60a5fa;
            --border: #e0e0e0; --success: #10b981; --danger: #ef4444;
            --card-bg: #ffffff;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #191919; --bg-secondary: #252525;
                --text-primary: #ffffff; --text-secondary: #a0a0a0;
                --accent: #60a5fa; --accent-light: #93c5fd;
                --border: #2f2f2f; --success: #34d399; --danger: #f87171;
                --card-bg: #202020;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
        .progress-ring { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; text-align: center; margin-bottom: 2rem; }
        .ring-container { position: relative; width: 200px; height: 200px; margin: 0 auto; }
        .ring-value { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; font-weight: 700; color: var(--accent); }
        .ring-label { margin-top: 1rem; font-size: 1rem; color: var(--text-secondary); }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-value.pending { color: var(--danger); }
        .stat-value.done { color: var(--success); }
        .stat-label { font-size: 0.75rem; color: var(--text-secondary); }
        .task-list { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
        .list-title { font-weight: 600; margin-bottom: 1rem; }
        .task-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; border-bottom: 1px solid var(--border); }
        .task-item:last-child { border-bottom: none; }
        .task-checkbox { width: 20px; height: 20px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
        .task-checkbox.done { background: var(--success); color: white; }
        .task-checkbox.pending { border: 2px solid var(--danger); }
        .task-name { flex: 1; }
        .task-name.done { text-decoration: line-through; color: var(--text-secondary); }
        .loading { text-align: center; padding: 3rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ Tareas</h1>
        <p class="subtitle">Última actualización: <span id="lastUpdate">Cargando...</span></p>
        
        <div class="progress-ring">
            <div class="ring-container">
                <canvas id="progressChart" width="200" height="200"></canvas>
                <div class="ring-value" id="progressValue">0%</div>
            </div>
            <div class="ring-label">Completado</div>
        </div>
        
        <div class="stats-grid" id="statsGrid"><div class="loading">...</div></div>
        
        <div class="task-list">
            <div class="list-title">Lista de Tareas</div>
            <div id="taskList"></div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('datos.json');
                const data = await response.json();
                document.getElementById('lastUpdate').textContent = data.metadata?.ultima_actualizacion || 'Desconocida';
                
                // NOMBRES EXACTOS: Tarea (title), Hecho (checkbox)
                const tareas = data.datos?.tareas || data.tareas || [];
                processTasks(tareas);
            } catch (error) {
                document.getElementById('statsGrid').innerHTML = `<div style="color: var(--danger);">Error: ${error.message}</div>`;
            }
        }

        function processTasks(tareas) {
            const processed = tareas.map(t => {
                const props = t.properties || {};
                return {
                    // NOMBRES EXACTOS:
                    nombre: props.Tarea?.title?.[0]?.plain_text || 'Sin nombre',
                    hecho: props.Hecho?.checkbox === true
                };
            });

            const total = processed.length;
            const hechas = processed.filter(t => t.hecho).length;
            const pendientes = total - hechas;
            const progreso = total > 0 ? (hechas / total) * 100 : 0;

            document.getElementById('progressValue').textContent = progreso.toFixed(0) + '%';
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${total}</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value pending">${pendientes}</div>
                    <div class="stat-label">Pendientes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value done">${hechas}</div>
                    <div class="stat-label">Completadas</div>
                </div>
            `;

            renderRing(progreso);
            renderList(processed);
        }

        function renderRing(progreso) {
            const ctx = document.getElementById('progressChart').getContext('2d');
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Completado', 'Pendiente'],
                    datasets: [{
                        data: [progreso, 100 - progreso],
                        backgroundColor: ['#3b82f6', isDark ? '#2f2f2f' : '#e0e0e0'],
                        borderWidth: 0,
                        cutout: '85%'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false }, tooltip: { enabled: false } }
                }
            });
        }

        function renderList(tareas) {
            document.getElementById('taskList').innerHTML = tareas.map(t => `
                <div class="task-item">
                    <div class="task-checkbox ${t.hecho ? 'done' : 'pending'}">${t.hecho ? '✓' : ''}</div>
                    <div class="task-name ${t.hecho ? 'done' : ''}">${t.nombre}</div>
                </div>
            `).join('');
        }

        loadData();
    </script>
</body>
</html>
