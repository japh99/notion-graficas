<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Tareas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f5f5f5;
            --text-primary: #2c2c2c; --text-secondary: #6b6b6b;
            --accent: #3b82f6; --accent-light: #60a5fa;
            --border: #e0e0e0; --success: #10b981; --warning: #f59e0b;
            --card-bg: #ffffff;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #191919; --bg-secondary: #252525;
                --text-primary: #ffffff; --text-secondary: #a0a0a0;
                --accent: #60a5fa; --accent-light: #93c5fd;
                --border: #2f2f2f; --success: #34d399; --warning: #fbbf24;
                --card-bg: #202020;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
        .progress-ring { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; text-align: center; margin-bottom: 2rem; }
        .ring-container { position: relative; width: 180px; height: 180px; margin: 0 auto; }
        .ring-value { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2.5rem; font-weight: 700; color: var(--accent); }
        .ring-label { margin-top: 1rem; color: var(--text-secondary); }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-value.pending { color: var(--warning); }
        .stat-value.done { color: var(--success); }
        .stat-label { font-size: 0.75rem; color: var(--text-secondary); }
        .task-list { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; max-height: 400px; overflow-y: auto; }
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .list-title { font-weight: 600; }
        .filter-btn { font-size: 0.8rem; padding: 0.25rem 0.75rem; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-secondary); cursor: pointer; }
        .task-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem; border-bottom: 1px solid var(--border); }
        .task-item:last-child { border-bottom: none; }
        .task-checkbox { width: 18px; height: 18px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; flex-shrink: 0; }
        .task-checkbox.done { background: var(--success); color: white; }
        .task-checkbox.pending { border: 2px solid var(--warning); }
        .task-checkbox.waiting { border: 2px solid var(--accent); }
        .task-name { flex: 1; font-size: 0.9rem; }
        .task-name.done { text-decoration: line-through; color: var(--text-secondary); }
        .task-date { font-size: 0.7rem; color: var(--text-secondary); }
        .loading { text-align: center; padding: 3rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ Tareas</h1>
        <p class="subtitle">Última actualización: <span id="lastUpdate">Cargando...</span></p>
        
        <div class="progress-ring">
            <div class="ring-container">
                <canvas id="progressChart" width="180" height="180"></canvas>
                <div class="ring-value" id="progressValue">0%</div>
            </div>
            <div class="ring-label">Completado</div>
        </div>
        
        <div class="stats-grid" id="statsGrid"><div class="loading">...</div></div>
        
        <div class="task-list">
            <div class="list-header">
                <div class="list-title">Lista de Tareas (171 total)</div>
                <button class="filter-btn" onclick="toggleFilter()">Ver todas</button>
            </div>
            <div id="taskList"></div>
        </div>
    </div>

    <script>
        let allTasks = [];
        let showAll = false;

        async function loadData() {
            try {
                const response = await fetch('datos.json');
                const data = await response.json();
                document.getElementById('lastUpdate').textContent = data.metadata?.ultima_actualizacion || 'Desconocida';
                
                const tareas = data.datos?.tareas || [];
                processTareas(tareas);
            } catch (error) {
                document.getElementById('statsGrid').innerHTML = `<div style="color: #ef4444;">Error: ${error.message}</div>`;
            }
        }

        function processTareas(tareas) {
            // ESTRUCTURA REAL:
            // • Fecha (date) → "2025-06-08T23:30:00.000-05:00"
            // • Planificada para días pasados (formula) → "⏰[PENDIENTE]"
            // • Proyectos (relation)
            // • En espera (checkbox) → false
            // • Hecho (checkbox) → true
            // • Nombre (title) → "Lavar los Dientes"
            
            allTasks = tareas.map(t => {
                const p = t.properties || {};
                return {
                    nombre: p.Nombre?.title?.[0]?.plain_text || 'Sin nombre',
                    hecho: p.Hecho?.checkbox === true,
                    enEspera: p['En espera']?.checkbox === true,
                    fecha: p.Fecha?.date?.start,
                    planificacion: p['Planificada para días pasados']?.formula?.string || ''
                };
            });

            const hechas = allTasks.filter(t => t.hecho).length;
            const enEspera = allTasks.filter(t => t.enEspera && !t.hecho).length;
            const pendientes = allTasks.length - hechas - enEspera;
            const progreso = allTasks.length ? (hechas / allTasks.length) * 100 : 0;

            document.getElementById('progressValue').textContent = progreso.toFixed(0) + '%';
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${allTasks.length}</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value pending">${pendientes + enEspera}</div>
                    <div class="stat-label">Pendientes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value done">${hechas}</div>
                    <div class="stat-label">Completadas</div>
                </div>
            `;

            renderRing(progreso);
            renderList();
        }

        function renderRing(progreso) {
            const ctx = document.getElementById('progressChart').getContext('2d');
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Completado', 'Pendiente'],
                    datasets: [{
                        data: [progreso, 100 - progreso],
                        backgroundColor: ['#3b82f6', isDark ? '#2f2f2f' : '#e0e0e0'],
                        borderWidth: 0,
                        cutout: '85%'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false }, tooltip: { enabled: false } }
                }
            });
        }

        function renderList() {
            const tasksToShow = showAll ? allTasks : allTasks.slice(0, 20);
            
            document.getElementById('taskList').innerHTML = tasksToShow.map(t => {
                let checkboxClass = 'pending';
                let checkContent = '';
                if (t.hecho) {
                    checkboxClass = 'done';
                    checkContent = '✓';
                } else if (t.enEspera) {
                    checkboxClass = 'waiting';
                }
                
                const dateStr = t.fecha ? new Date(t.fecha).toLocaleDateString('es') : '';
                
                return `
                    <div class="task-item">
                        <div class="task-checkbox ${checkboxClass}">${checkContent}</div>
                        <div class="task-name ${t.hecho ? 'done' : ''}">${t.nombre}</div>
                        <div class="task-date">${dateStr}</div>
                    </div>
                `;
            }).join('');
        }

        function toggleFilter() {
            showAll = !showAll;
            document.querySelector('.filter-btn').textContent = showAll ? 'Ver menos' : 'Ver todas';
            renderList();
        }

        loadData();
    </script>
</body>
</html>
