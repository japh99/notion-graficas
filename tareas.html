<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPH 2026 - Tareas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>✅ Tareas</h1>
        <p class="subtitle">Última actualización: <span id="lastUpdate">Cargando...</span></p>
        
        <div class="progress-ring">
            <div class="ring-container">
                <canvas id="progressChart" width="180" height="180"></canvas>
                <div class="ring-value" id="progressValue">0%</div>
            </div>
            <div class="ring-label">Completado</div>
        </div>
        
        <div class="stats-grid" id="statsGrid"><div class="loading">...</div></div>
        
        <div class="task-list">
            <div class="list-header">
                <div class="list-title">Lista de Tareas (171 total)</div>
                <button class="filter-btn" onclick="toggleFilter()">Ver todas</button>
            </div>
            <div id="taskList"></div>
        </div>
    </div>    <script src="js/tareas.js"></script>
</body>
</html>
